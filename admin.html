<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログ確認テスト</title>
</head>
<body>
    <h1>ログ表示テスト</h1>
    <div id="result">読み込み中...</div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        // あなたのプロジェクト設定（index.htmlと同じもの）を入れてください
        const firebaseConfig = {
            apiKey: "AIzaSyC7R6Hbgt3C6iq_ozLM6FF6DBGA65j6dd0",
            authDomain: "my-class-site.firebaseapp.com",
            projectId: "my-class-site",
            storageBucket: "my-class-site.firebasestorage.app",
            messagingSenderId: "125594983188",
            appId: "1:125594983188:web:129aa54e9d3a39ca700001"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // データを取得して表示するだけのシンプルな命令
        db.collection("access_logs").get().then((querySnapshot) => {
            let html = "<ul>";
            querySnapshot.forEach((doc) => {
                html += `<li>${doc.data().email} - ${doc.data().loginTime?.toDate()}</li>`;
            });
            html += "</ul>";
            document.getElementById("result").innerHTML = html;
        }).catch((error) => {
            document.getElementById("result").innerHTML = "エラー発生: " + error.message;
        });
    </script>
</body>
</html>
