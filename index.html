<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学級管理システム</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; line-height: 1.6; }
        section { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        button { padding: 10px 20px; cursor: pointer; background: #333; color: white; border: none; border-radius: 4px; }
        .post-item { border-bottom: 1px solid #eee; padding: 10px 0; }
        .post-date { font-size: 0.8em; color: gray; }
    </style>
</head>
<body>

    <div id="login-section" style="text-align: center;">
        <h1>ログイン</h1>
        <input type="email" id="login-email" placeholder="メールアドレス"><br>
        <input type="password" id="login-password" placeholder="パスワード"><br>
        <button id="login-btn">ログイン</button>
        <p id="error-message" style="color:red;"></p>
    </div>

    <div id="main-content" style="display: none;">
        <header style="display: flex; justify-content: space-between;">
            <h2 id="welcome-msg">こんにちは</h2>
            <button id="logout-btn">ログアウト</button>
        </header>

        <section>
            <h2>📢 今週の予定</h2>
            <div id="schedule-display"><p id="schedule-text" style="white-space: pre-wrap;"></p></div>
            <div id="schedule-edit" style="display: none;">
                <textarea id="schedule-input"></textarea>
                <button id="update-schedule-btn">予定を更新</button>
            </div>
        </section>

        <section>
            <h2>📝 担任ブログ</h2>
            <div id="blog-admin-form" style="display: none; background: #f9f9f9; padding: 10px;">
                <textarea id="blog-input" placeholder="ブログの内容"></textarea>
                <button id="post-blog-btn">投稿する</button>
            </div>
            <div id="blog-list">読み込み中...</div>
        </section>

        <section id="admin-section" style="display: none; border: 2px solid red;">
            <h2 style="color: red;">🛠 管理者メニュー</h2>
            <input type="file" id="csv-file" accept=".csv">
            <button id="import-csv-btn">名簿インポート</button>
            <div id="log-list"></div>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // 設定（ご自身のものに）
        const firebaseConfig = {
            apiKey: "AIzaSyC7R6Hbgt3C6iq_ozLM6FF6DBGA65j6dd0",
            authDomain: "my-class-site.firebaseapp.com",
            projectId: "my-class-site",
            storageBucket: "my-class-site.firebasestorage.app",
            messagingSenderId: "125594983188",
            appId: "1:125594983188:web:129aa54e9d3a39ca700001"
        };
        const TEACHER_EMAIL = "teacher@example.com"; 

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ログイン処理を確実に紐付け
        document.getElementById('login-btn').onclick = function() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            firebase.auth().signInWithEmailAndPassword(email, password)
                .then(res => startApp(res.user))
                .catch(err => alert("ログインに失敗しました"));
        };

        async function startApp(user) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';

            // 名簿から名前を取得
            const doc = await db.collection("students").doc(user.email).get();
            const name = doc.exists ? doc.data().name : "ゲスト";
            document.getElementById('welcome-msg').innerText = name + " さん、おかえりなさい！";

            // 予定の読み込み
            db.collection("config").doc("weekly_schedule").onSnapshot(d => {
                if(d.exists) {
                    document.getElementById('schedule-text').innerText = d.data().text;
                    document.getElementById('schedule-input').value = d.data().text;
                }
            });

            // ブログの読み込み（エラーが起きやすい「未来の日付除外」を一旦やめました）
            db.collection("blogs").orderBy("createdAt", "desc").limit(20).onSnapshot(snap => {
                const list = document.getElementById('blog-list');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const date = d.createdAt ? d.createdAt.toDate().toLocaleString() : "";
                    list.innerHTML += `<div class="post-item"><div class="post-date">${date}</div><div>${d.content}</div></div>`;
                });
            });

            // 管理者なら編集フォームを表示
            if (user.email === TEACHER_EMAIL) {
                document.getElementById('admin-section').style.display = 'block';
                document.getElementById('schedule-edit').style.display = 'block';
                document.getElementById('blog-admin-form').style.display = 'block';
            }
        }

        // 予定更新
        document.getElementById('update-schedule-btn').onclick = function() {
            db.collection("config").doc("weekly_schedule").set({
                text: document.getElementById('schedule-input').value,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => alert("更新しました"));
        };

        // ブログ投稿
        document.getElementById('post-blog-btn').onclick = function() {
            const val = document.getElementById('blog-input').value;
            if(!val) return;
            db.collection("blogs").add({
                content: val,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                document.getElementById('blog-input').value = "";
                alert("投稿しました");
            });
        };

        // ログアウト
        document.getElementById('logout-btn').onclick = function() {
            location.reload();
        };

        // CSV名簿インポート
        document.getElementById('import-csv-btn').onclick = function() {
            const file = document.getElementById('csv-file').files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                const rows = e.target.result.split("\n");
                for(let row of rows) {
                    const cols = row.split(",");
                    if(cols[0].includes("@")) {
                        await db.collection("students").doc(cols[0].trim()).set({ name: cols[1].trim() });
                    }
                }
                alert("名簿を読み込みました");
            };
            reader.readAsText(file);
        };
    </script>
</body>
</html>
