<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Class Portal</title>
    <style>
        /* 白黒・ＭＳゴシック基調のシンプルスタイル */
        body { 
            background-color: white; 
            color: black; 
            font-family: "MS UI Gothic", "MS Gothic", sans-serif; 
            line-height: 1.5; 
            padding: 20px; 
            max-width: 850px; 
            margin: 0 auto; 
        }
        h1, h2, h3 { 
            font-weight: bold;
            border-bottom: 1px solid black; 
            margin-top: 25px;
            padding-bottom: 5px;
        }
        section { margin-bottom: 40px; border: 1px solid black; padding: 20px; }
        input, textarea, select { 
            width: 100%; max-width: 500px; padding: 8px; margin-bottom: 10px; 
            border: 1px solid black; box-sizing: border-box; font-family: inherit;
            background: white; color: black;
        }
        button { 
            padding: 8px 15px; cursor: pointer; background: white; color: black; 
            border: 1px solid black; font-weight: bold; font-family: inherit;
            margin-right: 5px; margin-bottom: 5px;
        }
        button:hover { background: black; color: white; }
        
        .day-container { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 10px; }
        .day-box { flex: 1; border: 1px solid black; padding: 15px; min-width: 320px; }
        .day-label { font-weight: bold; font-size: 1.1em; border-bottom: 2px solid black; display: block; margin-bottom: 10px; padding-bottom: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 5px; font-size: 0.95em; }
        th, td { border: 1px solid black; padding: 8px; text-align: center; }
        th { background: white; } 
        
        .admin-form-box { background: white; padding: 15px; border: 1px solid black; margin-bottom: 20px; }
        .post-item { border-bottom: 1px dashed black; padding: 15px 0; }
        .post-date { font-size: 0.8em; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="login-section" style="text-align: center; margin-top: 50px;">
        <h1>My Class Portal</h1>
        <input type="email" id="login-email" placeholder="メールアドレス"><br>
        <input type="password" id="login-password" placeholder="パスワード"><br>
        <button id="login-btn">ログイン</button>
    </div>

    <div id="main-content" style="display: none;">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 id="welcome-msg" style="border:none; margin:0;">確認中...</h2>
            <button onclick="location.reload()">ログアウト</button>
        </header>

        <main>
            <section>
                <h2>教科連絡や主な予定</h2>
                <div class="day-container" id="schedule-display">
                    <div id="area-1" class="day-box">確認中...</div>
                    <div id="area-2" class="day-box">確認中...</div>
                </div>
            </section>

            <section>
                <h2>担任の駄辯</h2>
                <div id="blog-admin-form" style="display: none;" class="admin-form-box">
                    <textarea id="blog-input" placeholder="投稿内容"></textarea><br>
                    <button id="post-blog-btn">投稿する</button>
                </div>
                <div id="blog-list"></div>
            </section>

            <section id="admin-area" style="display: none; border: 2px solid black;">
                <h2 style="border-bottom: 2px solid black;">管理者用メニュー：予定設定</h2>
                
                <details class="admin-form-box">
                    <summary style="cursor:pointer; font-weight:bold;">［設定］標準（レギュラー）の時間割</summary>
                    曜日：<select id="reg-day-select" onchange="loadRegularSetting()" style="width:150px;">
                        <option value="mon">月曜日</option><option value="tue">火曜日</option>
                        <option value="wed">水曜日</option><option value="thu">木曜日</option>
                        <option value="fri">金曜日</option>
                    </select>
                    <table id="reg-table"></table>
                    <button onclick="saveRegularSetting()" style="margin-top:10px;">標準設定を保存</button>
                </details>

                <details class="admin-form-box">
                    <summary style="cursor:pointer; font-weight:bold;">［設定］長期休業・臨時休校（期間スキップ）</summary>
                    開始：<input type="date" id="vac-start" style="width:160px;"> 終了：<input type="date" id="vac-end" style="width:160px;">
                    <button onclick="saveVacation()">期間を登録</button>
                    <div id="vacation-list" style="margin-top:10px;"></div>
                </details>

                <div class="admin-form-box">
                    <h3>予定の個別編集</h3>
                    日付：<input type="date" id="edit-date-select" style="width:200px;">
                    <button onclick="loadScheduleEdit()">編集データ呼出</button>
                    <div id="edit-form" style="display:none; margin-top:15px;">
                        <table id="edit-table"></table>
                        最終下校時刻：<select id="edit-exit-time" style="width:150px;"></select>
                        <button onclick="saveSchedule()">この内容で保存・公開</button>
                    </div>
                </div>
            </section>

            <section id="student-admin-area" style="display: none; border: 2px solid black;">
                <h2 style="border-bottom: 2px solid black;">管理者用メニュー：名簿管理</h2>
                <div class="admin-form-box">
                    <input type="email" id="direct-email" placeholder="メールアドレス" style="width:250px;">
                    <input type="text" id="direct-name" placeholder="氏名" style="width:150px;">
                    <button onclick="registerDirect()">登録</button>
                </div>
                <div id="student-list-area"></div>
            </section>

            <section>
                <h2>パスワード変更</h2>
                <div style="max-width:400px;">
                    <input type="password" id="old-password" placeholder="現在のパスワード" onpaste="return false;"><br>
                    <input type="password" id="new-password" placeholder="新しいパスワード（6文字以上）" onpaste="return false;"><br>
                    <button id="change-pw-btn">パスワードを変更する</button>
                </div>
            </section>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // ★ご自身の情報に書き換えてください
        const firebaseConfig = {
            apiKey: "AIzaSyC7R6Hbgt3C6iq_ozLM6FF6DBGA65j6dd0",
            authDomain: "my-class-site.firebaseapp.com",
            projectId: "my-class-site",
            storageBucket: "my-class-site.firebasestorage.app",
            messagingSenderId: "125594983188",
            appId: "1:125594983188:web:129aa54e9d3a39ca700001"
        };
        const TEACHER_EMAIL = "administrator@class.jp";
        const SUBJECTS = ["", "国語", "社会", "数学", "理科", "英語", "音楽", "美術", "保体", "技家", "学活", "総合", "道徳", "行事"];

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let studentMaster = {};
        let vacationData = [];
        let holidays = {};

        // 10分刻みの下校時刻生成
        function initExitTimeOptions(targetEl) {
            let html = "";
            for(let h=13; h<=19; h++) {
                for(let m=0; m<60; m+=10) {
                    let time = `${h}:${m===0?'00':m}`;
                    html += `<option value="${time}">${time}</option>`;
                }
            }
            targetEl.innerHTML = html;
        }

        // ログイン処理
        document.getElementById('login-btn').onclick = () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            firebase.auth().signInWithEmailAndPassword(email, pass).then(res => initApp(res.user)).catch(() => alert("ログインに失敗しました"));
        };

        // アプリケーション初期化
        async function initApp(user) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';

            // 祝日、休業期間、名簿データの取得
            const [hRes, vSnap, sSnap] = await Promise.all([
                fetch('https://holidays-jp.github.io/api/v1/date.json').then(r => r.json()),
                db.collection("config").doc("vacations").get(),
                db.collection("students").get()
            ]);
            holidays = hRes;
            vacationData = vSnap.exists ? vSnap.data().periods : [];
            sSnap.forEach(doc => { studentMaster[doc.id] = { name: doc.data().name, lastLogin: doc.data().lastLogin?.toDate() }; });

            // --- 時間帯による挨拶の切り替え ---
            const hour = new Date().getHours();
            let greeting = "こんにちは";
            if (hour >= 17 || hour < 6) {
                greeting = "こんばんは";
            } else if (hour >= 6 && hour < 11) {
                greeting = "おはようございます";
            }
            
            const userName = studentMaster[user.email]?.name || "先生";
            document.getElementById('welcome-msg').innerText = `${greeting}、${userName}さん`;

            // ログイン時刻の更新（エラー回避のcatch付き）
            await db.collection("students").doc(user.email).update({ lastLogin: firebase.firestore.FieldValue.serverTimestamp() }).catch(()=>{});

            // ブログの読み込み
            db.collection("blogs").orderBy("createdAt", "desc").limit(20).onSnapshot(snap => {
                const list = document.getElementById('blog-list'); list.innerHTML = "";
                snap.forEach(d => {
                    const date = d.data().createdAt ? d.data().createdAt.toDate().toLocaleString() : "";
                    list.innerHTML += `<div class="post-item"><div class="post-date">${date}</div><div>${d.data().content.replace(/\n/g, '<br>')}</div></div>`;
                });
            });

            // 管理者機能の解放
            if (user.email === TEACHER_EMAIL) {
                document.getElementById('admin-area').style.display = 'block';
                document.getElementById('student-admin-area').style.display = 'block';
                document.getElementById('blog-admin-form').style.display = 'block';
                initExitTimeOptions(document.getElementById('edit-exit-time'));
                loadRegularSetting();
                renderVacationList();
                loadStudentList();
            }
            displayNextSchoolDays();
        }

        // --- 予定表の表示関連 ---
        function isSchoolDay(dateStr) {
            const d = new Date(dateStr);
            const day = d.getDay();
            if (day === 0 || day === 6) return false;
            if (holidays[dateStr]) return false;
            if (vacationData.find(v => dateStr >= v.start && dateStr <= v.end)) return false;
            return true;
        }

        async function displayNextSchoolDays() {
            let foundDays = [];
            let checkDate = new Date();
            const todayStr = checkDate.toISOString().split('T')[0];

            while (foundDays.length < 2) {
                let dateStr = checkDate.toISOString().split('T')[0];
                if (isSchoolDay(dateStr)) {
                    foundDays.push({ date: dateStr, gap: (new Date(dateStr) - new Date(todayStr)) / (1000*60*60*24) });
                }
                checkDate.setDate(checkDate.getDate() + 1);
            }

            let label1 = foundDays[0].gap === 0 ? "本日" : "次回";
            await renderDay(foundDays[0].date, "area-1", label1);

            const dateDiff = (new Date(foundDays[1].date) - new Date(foundDays[0].date)) / (1000*60*60*24);
            let label2 = dateDiff === 1 ? "明日" : "次回";
            await renderDay(foundDays[1].date, "area-2", label2);
        }

        async function renderDay(dateStr, elId, prefix) {
            const el = document.getElementById(elId);
            const d = new Date(dateStr);
            const week = ["日", "月", "火", "水", "木", "金", "土"];
            const label = `${prefix} ${d.getMonth()+1}月${d.getDate()}日（${week[d.getDay()]}）`;

            const doc = await db.collection("schedules").doc(dateStr).get();
            let data = doc.exists ? doc.data() : null;

            if (!data) {
                const dayKeys = ["sun", "mon", "tue", "wed", "thu", "fri", "sat"];
                const regDoc = await db.collection("config").doc("regular_schedule").get();
                const regWeek = regDoc.exists ? regDoc.data()[dayKeys[d.getDay()]] : null;
                data = { lessons: Array.from({length:6}, (_, i) => ({ sub: regWeek?.[i] || "", note: "" })), exitTime: "16:30" };
            }

            let html = `<span class="day-label">${label}</span><table><tr><th>校時</th><th>科目</th><th>備考</th></tr>`;
            data.lessons.forEach((l, i) => {
                html += `<tr><td>${i+1}</td><td>${l.sub || "ー"}</td><td>${l.note || "いつも通り"}</td></tr>`;
            });
            html += `</table><p style="text-align:right; font-weight:bold; margin-top:10px;">最終下校：${data.exitTime}</p>`;
            el.innerHTML = html;
        }

        // --- 管理機能（予定・休業期間） ---
        async function loadRegularSetting() {
            const day = document.getElementById('reg-day-select').value;
            const doc = await db.collection("config").doc("regular_schedule").get();
            const table = document.getElementById('reg-table'); table.innerHTML = "";
            const data = doc.exists ? (doc.data()[day] || []) : [];
            for (let i = 0; i < 6; i++) {
                let opts = SUBJECTS.map(s => `<option value="${s}" ${s===(data[i]||"")?'selected':''}>${s||"（空欄）"}</option>`).join('');
                table.innerHTML += `<tr><td>${i+1}</td><td><select id="reg-sub-${i}">${opts}</select></td></tr>`;
            }
        }
        async function saveRegularSetting() {
            const day = document.getElementById('reg-day-select').value;
            const lessons = Array.from({length:6}, (_, i) => document.getElementById(`reg-sub-${i}`).value);
            await db.collection("config").doc("regular_schedule").set({ [day]: lessons }, { merge: true });
            alert("保存しました"); displayNextSchoolDays();
        }
        async function saveVacation() {
            const s = document.getElementById('vac-start').value, e = document.getElementById('vac-end').value;
            if(!s || !e) return;
            vacationData.push({ start: s, end: e });
            await db.collection("config").doc("vacations").set({ periods: vacationData });
            renderVacationList(); displayNextSchoolDays();
        }
        function renderVacationList() {
            document.getElementById('vacation-list').innerHTML = vacationData.map((v, i) => 
                `${v.start} 〜 ${v.end} <button onclick="deleteVac(${i})">削除</button>`).join('<br>');
        }
        async function deleteVac(i) { vacationData.splice(i,1); await db.collection("config").doc("vacations").set({ periods: vacationData }); renderVacationList(); displayNextSchoolDays(); }

        async function loadScheduleEdit() {
            const date = document.getElementById('edit-date-select').value; if(!date) return;
            const doc = await db.collection("schedules").doc(date).get();
            const table = document.getElementById('edit-table'); table.innerHTML = "";
            let data = doc.exists ? doc.data() : null;
            if(!data) {
                const dayNum = new Date(date).getDay();
                const regDoc = await db.collection("config").doc("regular_schedule").get();
                const regData = regDoc.exists ? regDoc.data()[["sun", "mon", "tue", "wed", "thu", "fri", "sat"][dayNum]] : null;
                data = { lessons: Array.from({length:6}, (_, i) => ({ sub: regData?.[i] || "", note: "" })), exitTime: "16:30" };
            }
            data.lessons.forEach((l, i) => {
                let opts = SUBJECTS.map(s => `<option value="${s}" ${s===l.sub?'selected':''}>${s||"（空欄）"}</option>`).join('');
                table.innerHTML += `<tr><td>${i+1}</td><td><select id="edit-sub-${i}">${opts}</select></td><td><input type="text" id="edit-note-${i}" value="${l.note}"></td></tr>`;
            });
            initExitTimeOptions(document.getElementById('edit-exit-time'));
            document.getElementById('edit-exit-time').value = data.exitTime;
            document.getElementById('edit-form').style.display = "block";
        }
        async function saveSchedule() {
            const date = document.getElementById('edit-date-select').value;
            const lessons = Array.from({length:6}, (_, i) => ({ sub: document.getElementById(`edit-sub-${i}`).value, note: document.getElementById(`edit-note-${i}`).value }));
            await db.collection("schedules").doc(date).set({ lessons, exitTime: document.getElementById('edit-exit-time').value, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
            alert("保存しました"); displayNextSchoolDays();
        }

        // --- 管理機能（ブログ・名簿・パスワード） ---
        document.getElementById('post-blog-btn').onclick = () => {
            const content = document.getElementById('blog-input').value; if(!content) return;
            db.collection("blogs").add({ content, createdAt: firebase.firestore.FieldValue.serverTimestamp() })
              .then(() => { document.getElementById('blog-input').value = ""; alert("投稿しました"); });
        };

        async function loadStudentList() {
            const snap = await db.collection("students").get();
            let html = "<table><tr><th>氏名</th><th>操作</th></tr>";
            snap.forEach(doc => { html += `<tr><td>${doc.data().name} (${doc.id})</td><td><button onclick="deleteStudent('${doc.id}')">削除</button></td></tr>`; });
            document.getElementById('student-list-area').innerHTML = html + "</table>";
        }
        async function registerDirect() {
            const email = document.getElementById('direct-email').value, name = document.getElementById('direct-name').value;
            if(!email || !name) return;
            await db.collection("students").doc(email).set({ name });
            document.getElementById('direct-email').value = ""; document.getElementById('direct-name').value = "";
            loadStudentList();
        }
        async function deleteStudent(id) {
            if(confirm("削除しますか？")) { await db.collection("students").doc(id).delete(); loadStudentList(); }
        }

        document.getElementById('change-pw-btn').onclick = async () => {
            const user = firebase.auth().currentUser;
            const oldPw = document.getElementById('old-password').value;
            const newPw = document.getElementById('new-password').value;
            if(!oldPw || !newPw) return alert("入力してください");
            try {
                await user.reauthenticateWithCredential(firebase.auth.EmailAuthProvider.credential(user.email, oldPw));
                await user.updatePassword(newPw);
                alert("パスワードを変更しました");
                document.getElementById('old-password').value = ""; document.getElementById('new-password').value = "";
            } catch (e) { alert("変更に失敗しました。現在のパスワードを確認してください。"); }
        };

    </script>
</body>
</html>
