<body>
    <div id="login-section" style="text-align: center; margin-top: 50px;">
        <h1>学級専用ページ</h1>
        <p>出席番号（メール形式）とパスワードを入力してください</p>
        <input type="email" id="email" placeholder="s01@class.jp" style="padding: 8px;"><br><br>
        <input type="password" id="password" placeholder="パスワード" style="padding: 8px;"><br><br>
        <button onclick="login()" style="padding: 10px 20px; cursor: pointer;">ログイン</button>
        <p id="error-message" style="color: red;"></p>
    </div>

    <div id="main-content" style="display: none;">
        <header>
            <h1>３年３組 学級だより</h1>
            <button onclick="logout()">ログアウト</button>
        </header>
        <main>
            <section>
                <h2>今週の予定</h2>
                <p>ここはログインした生徒だけが閲覧できるページです。</p>
            </section>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        // --- ここにあなたの firebaseConfig を貼り付けます ---
        const firebaseConfig = {
    	   apiKey: "AIzaSyC7R6Hbgt3C6iq_ozLM6FF6DBGA65j6dd0",
    	   authDomain: "my-class-site.firebaseapp.com",
    	   projectId: "my-class-site",
    	   storageBucket: "my-class-site.firebasestorage.app",
    	   messagingSenderId: "125594983188",
    	   appId: "1:125594983188:web:129aa54e9d3a39ca700001",
    	   measurementId: "G-4EQ3Z9Q4NT"
        };
        firebase.initializeApp(firebaseConfig);
        // -----------------------------------------------

        // ログインボタンを押した時の動き
        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-message');

            firebase.auth().signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // ログイン成功
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('main-content').style.display = 'block';
                    alert("ログインしました！");
                })
                .catch((error) => {
                    // ログイン失敗
                    errorMsg.innerText = "IDまたはパスワードが違います。";
                });
        }

        // ログアウトの動き
        function logout() {
            firebase.auth().signOut().then(() => {
                location.reload(); // ページを再読み込みしてログイン画面に戻す
            });
        }
    </script>
</body>
