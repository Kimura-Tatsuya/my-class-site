<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Class Portal</title>
    <style>
        /* 白黒・ＭＳゴシック基調のシンプルスタイル */
        body { 
            background-color: white; 
            color: black; 
            font-family: "MS UI Gothic", "MS Gothic", sans-serif; 
            line-height: 1.5; 
            padding: 20px; 
            max-width: 850px; 
            margin: 0 auto; 
        }
        h1, h2, h3 { 
            font-weight: bold;
            border-bottom: 1px solid black; 
            margin-top: 25px;
            padding-bottom: 5px;
        }
        section { margin-bottom: 40px; border: 1px solid black; padding: 20px; }
        input, textarea, select { 
            width: 100%; max-width: 500px; padding: 8px; margin-bottom: 10px; 
            border: 1px solid black; box-sizing: border-box; font-family: inherit;
            background: white; color: black;
        }
        button { 
            padding: 8px 15px; cursor: pointer; background: white; color: black; 
            border: 1px solid black; font-weight: bold; font-family: inherit;
            margin-right: 5px; margin-bottom: 5px;
        }
        button:hover { background: black; color: white; }
        
        .day-container { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 10px; }
        .day-box { flex: 1; border: 1px solid black; padding: 15px; min-width: 320px; }
        .day-label { font-weight: bold; font-size: 1.1em; border-bottom: 2px solid black; display: block; margin-bottom: 10px; padding-bottom: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 5px; font-size: 0.95em; }
        th, td { border: 1px solid black; padding: 8px; text-align: center; }
        th { background: white; } 
        
        .admin-form-box { background: white; padding: 15px; border: 1px solid black; margin-bottom: 20px; }
        .post-item { border-bottom: 1px dashed black; padding: 15px 0; }
        .post-date { font-size: 0.8em; margin-bottom: 5px; font-weight: bold; }
        
        .admin-actions { margin-top: 10px; text-align: right; }
        .admin-actions button { padding: 4px 10px; font-size: 0.85em; }
    </style>
</head>
<body>

    <div id="login-section" style="text-align: center; margin-top: 50px;">
        <h1>My Class Portal</h1>
        <input type="email" id="login-email" placeholder="メールアドレス"><br>
        <input type="password" id="login-password" placeholder="パスワード"><br>
        <button id="login-btn">ログイン</button>
    </div>

    <div id="main-content" style="display: none;">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 id="welcome-msg" style="border:none; margin:0;">確認中...</h2>
            <button onclick="location.reload()">ログアウト</button>
        </header>

        <main>
            <section>
                <h2>直近の予定</h2>
                <div class="day-container" id="schedule-display">
                    <div id="area-1" class="day-box">確認中...</div>
                    <div id="area-2" class="day-box">確認中...</div>
                </div>
            </section>

            <section>
                <h2>回収物・提出物</h2>
                <div id="submission-list">確認中...</div>
            </section>

            <section>
                <h2>担任のやつ</h2>
                
                <div id="blog-admin-form" style="display: none;" class="admin-form-box">
                    <textarea id="blog-input" placeholder="投稿内容"></textarea><br>
                    <button id="post-blog-btn">新規投稿する</button>
                </div>

                <div id="blog-edit-form" style="display: none; border: 2px dashed black;" class="admin-form-box">
                    <h3>記事の編集</h3>
                    投稿日時：<input type="datetime-local" id="edit-blog-date" style="max-width: 250px;"><br>
                    内容：<textarea id="edit-blog-input"></textarea><br>
                    <button onclick="updateBlog()">この内容と日時で更新する</button>
                    <button onclick="cancelBlogEdit()">キャンセル</button>
                </div>

                <div id="blog-list"></div>
            </section>

            <section id="admin-area" style="display: none; border: 2px solid black;">
                <h2 style="border-bottom: 2px solid black;">管理者用メニュー：予定・提出物設定</h2>
                
                <details class="admin-form-box" open>
                    <summary style="cursor:pointer; font-weight:bold;">［設定］回収物・提出物の管理</summary>
                    <div style="margin-top:10px;">
                        提出物名：<input type="text" id="subm-title" style="width:200px;" placeholder="例：〇〇申込書">
                        締め切り：<input type="date" id="subm-deadline" style="width:150px;">
                        <button id="subm-add-btn" onclick="addSubmission()">追加</button>
                        <button id="subm-update-btn" style="display:none;" onclick="updateSubmission()">更新する</button>
                        <button id="subm-cancel-btn" style="display:none;" onclick="cancelSubmEdit()">キャンセル</button>
                    </div>
                    <table id="admin-submission-table" style="margin-top:15px;"></table>
                </details>

                <details class="admin-form-box">
                    <summary style="cursor:pointer; font-weight:bold;">［設定］標準（レギュラー）の時間割</summary>
                    曜日：<select id="reg-day-select" onchange="loadRegularSetting()" style="width:150px;">
                        <option value="mon">月曜日</option><option value="tue">火曜日</option>
                        <option value="wed">水曜日</option><option value="thu">木曜日</option>
                        <option value="fri">金曜日</option>
                    </select>
                    <table id="reg-table"></table>
                    <button onclick="saveRegularSetting()" style="margin-top:10px;">標準設定を保存</button>
                </details>

                <details class="admin-form-box">
                    <summary style="cursor:pointer; font-weight:bold;">［設定］長期休業・臨時休校（期間スキップ）</summary>
                    開始：<input type="date" id="vac-start" style="width:160px;"> 終了：<input type="date" id="vac-end" style="width:160px;">
                    <button onclick="saveVacation()">期間を登録</button>
                    <div id="vacation-list" style="margin-top:10px;"></div>
                </details>

                <div class="admin-form-box">
                    <h3>予定の個別編集</h3>
                    日付：<input type="date" id="edit-date-select" style="width:200px;">
                    <button onclick="loadScheduleEdit()">編集データ呼出</button>
                    <div id="edit-form" style="display:none; margin-top:15px;">
                        <table id="edit-table"></table>
                        最終下校時刻：<select id="edit-exit-time" style="width:150px;"></select>
                        <button onclick="saveSchedule()">この内容で保存・公開</button>
                    </div>
                </div>
            </section>

            <section id="student-admin-area" style="display: none; border: 2px solid black;">
                <h2 style="border-bottom: 2px solid black;">管理者用メニュー：名簿管理</h2>
                
                <div class="admin-form-box">
                    <h3>新規登録</h3>
                    <input type="email" id="direct-email" placeholder="メールアドレス" style="width:250px;">
                    <input type="text" id="direct-name" placeholder="氏名" style="width:150px;">
                    <button onclick="registerDirect()">新規登録</button>
                </div>

                <h3>登録済み一覧（名前の直接編集が可能）</h3>
                <div id="student-list-area"></div>
            </section>

            <section>
                <h2>パスワード変更</h2>
                <div style="max-width:400px;">
                    <input type="password" id="old-password" placeholder="現在のパスワード" onpaste="return false;"><br>
                    <input type="password" id="new-password" placeholder="新しいパスワード（6文字以上）" onpaste="return false;"><br>
                    <button id="change-pw-btn">パスワードを変更する</button>
                </div>
            </section>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC7R6Hbgt3C6iq_ozLM6FF6DBGA65j6dd0",
            authDomain: "my-class-site.firebaseapp.com",
            databaseURL: "https://my-class-site-default-rtdb.firebaseio.com",
            projectId: "my-class-site",
            storageBucket: "my-class-site.firebasestorage.app",
            messagingSenderId: "125594983188",
            appId: "1:125594983188:web:129aa54e9d3a39ca700001",
            measurementId: "G-4EQ3Z9Q4NT"
        };
        
        const TEACHER_EMAIL = "administrator@class.jp";
        const SUBJECTS = ["", "国語", "社会", "数学", "理科", "英語", "音楽", "美術", "保体", "技家", "学活", "総合", "道徳", "行事等"];

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let studentMaster = {};
        let vacationData = [];
        let holidays = {};
        let isAdmin = false;

        let editingBlogId = null;
        let editingSubmId = null;

        function initExitTimeOptions(targetEl) {
            let html = "";
            for(let h=13; h<=19; h++) {
                for(let m=0; m<60; m+=10) {
                    let time = `${h}:${m===0?'00':m}`;
                    html += `<option value="${time}">${time}</option>`;
                }
            }
            targetEl.innerHTML = html;
        }

        document.getElementById('login-btn').onclick = () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            firebase.auth().signInWithEmailAndPassword(email, pass)
                .then(res => initApp(res.user))
                .catch((error) => alert("ログイン失敗\nエラー内容: " + error.message));
        };

        async function initApp(user) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            isAdmin = (user.email === TEACHER_EMAIL);

            const [hRes, vSnap, sSnap] = await Promise.all([
                fetch('https://holidays-jp.github.io/api/v1/date.json').then(r => r.json()).catch(() => ({})),
                db.collection("config").doc("vacations").get(),
                db.collection("students").get()
            ]);
            holidays = hRes;
            vacationData = vSnap.exists ? vSnap.data().periods : [];
            sSnap.forEach(doc => { studentMaster[doc.id] = { name: doc.data().name, lastLogin: doc.data().lastLogin?.toDate() }; });

            const hour = new Date().getHours();
            let greeting = "こんにちは";
            if (hour >= 17 || hour < 6) greeting = "こんばんは";
            else if (hour >= 6 && hour < 11) greeting = "おはようございます";
            
            const userName = studentMaster[user.email]?.name || "先生";
            document.getElementById('welcome-msg').innerText = `${greeting}、${userName}さん！ ３年３組のポータルへようこそ！`;

            await db.collection("students").doc(user.email).update({ lastLogin: firebase.firestore.FieldValue.serverTimestamp() }).catch(()=>{});

            db.collection("submissions").orderBy("deadline", "asc").onSnapshot(snap => {
                const listEl = document.getElementById('submission-list');
                const adminTable = document.getElementById('admin-submission-table');
                
                if(snap.empty) {
                    listEl.innerHTML = "<p>現在、回収している提出物はありません。</p>";
                    if(adminTable) adminTable.innerHTML = "";
                    return;
                }

                let listHtml = "<table><tr><th>提出物名</th><th>締め切り</th></tr>";
                let adminHtml = "<tr><th>提出物名</th><th>締め切り</th><th>操作</th></tr>";

                snap.forEach(doc => {
                    const d = doc.data();
                    const dObj = new Date(d.deadline);
                    const week = ["日", "月", "火", "水", "木", "金", "土"];
                    const dateStr = isNaN(dObj) ? d.deadline : `${dObj.getMonth()+1}月${dObj.getDate()}日（${week[dObj.getDay()]}）`;
                    
                    listHtml += `<tr><td style="text-align:left;">${d.title}</td><td>${dateStr}</td></tr>`;
                    adminHtml += `<tr>
                                    <td style="text-align:left;">${d.title}</td>
                                    <td>${dateStr}</td>
                                    <td>
                                        <button onclick="startEditSubm('${doc.id}', '${d.title.replace(/'/g, "\\'")}', '${d.deadline}')">編集</button>
                                        <button onclick="deleteSubmission('${doc.id}')">削除</button>
                                    </td>
                                  </tr>`;
                });
                listHtml += "</table>";

                listEl.innerHTML = listHtml;
                if(adminTable) adminTable.innerHTML = adminHtml;
            });

            db.collection("blogs").orderBy("createdAt", "desc").limit(20).onSnapshot(snap => {
                const list = document.getElementById('blog-list'); list.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    let dateStr = "";
                    let isoDate = "";
                    if (data.createdAt) {
                        const dateObj = data.createdAt.toDate();
                        dateStr = dateObj.toLocaleString();
                        dateObj.setMinutes(dateObj.getMinutes() - dateObj.getTimezoneOffset());
                        isoDate = dateObj.toISOString().slice(0, 16);
                    }

                    let adminBtns = "";
                    if (isAdmin) {
                        const escapedContent = data.content.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n');
                        adminBtns = `
                        <div class="admin-actions">
                            <button onclick="startEditBlog('${d.id}', '${escapedContent}', '${isoDate}')">編集</button>
                            <button onclick="deleteBlog('${d.id}')">削除</button>
                        </div>`;
                    }

                    list.innerHTML += `<div class="post-item">
                                        <div class="post-date">${dateStr}</div>
                                        <div>${data.content.replace(/\n/g, '<br>')}</div>
                                        ${adminBtns}
                                       </div>`;
                });
            });

            if (isAdmin) {
                document.getElementById('admin-area').style.display = 'block';
                document.getElementById('student-admin-area').style.display = 'block';
                document.getElementById('blog-admin-form').style.display = 'block';
                initExitTimeOptions(document.getElementById('edit-exit-time'));
                loadRegularSetting();
                renderVacationList();
                loadStudentList();
            }
            displayNextSchoolDays();
        }

        function isSchoolDay(dateStr) {
            const d = new Date(dateStr);
            const day = d.getDay();
            if (day === 0 || day === 6) return false;
            if (holidays[dateStr]) return false;
            if (vacationData.find(v => dateStr >= v.start && dateStr <= v.end)) return false;
            return true;
        }

        async function displayNextSchoolDays() {
            let foundDays = [];
            let checkDate = new Date();
            const todayStr = checkDate.toISOString().split('T')[0];

            while (foundDays.length < 2) {
                let dateStr = checkDate.toISOString().split('T')[0];
                if (isSchoolDay(dateStr)) {
                    foundDays.push({ date: dateStr, gap: (new Date(dateStr) - new Date(todayStr)) / (1000*60*60*24) });
                }
                checkDate.setDate(checkDate.getDate() + 1);
            }

            let label1 = foundDays[0].gap === 0 ? "[本日]" : "[次回]";
            await renderDay(foundDays[0].date, "area-1", label1);

            const dateDiff = (new Date(foundDays[1].date) - new Date(foundDays[0].date)) / (1000*60*60*24);
            let label2 = dateDiff === 1 ? "[明日]" : "[次回]";
            await renderDay(foundDays[1].date, "area-2", label2);
        }

        async function renderDay(dateStr, elId, prefix) {
            const el = document.getElementById(elId);
            const d = new Date(dateStr);
            const week = ["日", "月", "火", "水", "木", "金", "土"];
            const label = `${prefix} ${d.getMonth()+1}月${d.getDate()}日（${week[d.getDay()]}）`;

            const doc = await db.collection("schedules").doc(dateStr).get();
            let data = doc.exists ? doc.data() : null;

            if (!data) {
                const dayKeys = ["sun", "mon", "tue", "wed", "thu", "fri", "sat"];
                const regDoc = await db.collection("config").doc("regular_schedule").get();
                const regWeek = regDoc.exists ? regDoc.data()[dayKeys[d.getDay()]] : null;
                data = { lessons: Array.from({length:6}, (_, i) => ({ sub: regWeek?.[i] || "", note: "" })), exitTime: "16:30" };
            }

            let html = `<span class="day-label">${label}</span><table><tr><th>校時</th><th>科目</th><th>備考</th></tr>`;
            data.lessons.forEach((l, i) => {
                const subText = l.sub || "---";
                // ★「いつも通り」の自動入力をやめて、空欄にするよう変更しました
                const noteText = l.note || "";
                html += `<tr><td>${i+1}</td><td>${subText}</td><td>${noteText}</td></tr>`;
            });
            html += `</table><p style="text-align:right; font-weight:bold; margin-top:10px;">最終下校：${data.exitTime}</p>`;
            el.innerHTML = html;
        }

        async function addSubmission() {
            const title = document.getElementById('subm-title').value.trim();
            const deadline = document.getElementById('subm-deadline').value;
            if(!title || !deadline) return alert("提出物名と締め切り日を入力してください");
            
            await db.collection("submissions").add({
                title: title,
                deadline: deadline,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('subm-title').value = "";
            document.getElementById('subm-deadline').value = "";
            alert("追加しました");
        }

        function startEditSubm(id, title, deadline) {
            editingSubmId = id;
            document.getElementById('subm-title').value = title;
            document.getElementById('subm-deadline').value = deadline;
            document.getElementById('subm-add-btn').style.display = 'none';
            document.getElementById('subm-update-btn').style.display = 'inline-block';
            document.getElementById('subm-cancel-btn').style.display = 'inline-block';
        }

        async function updateSubmission() {
            const title = document.getElementById('subm-title').value.trim();
            const deadline = document.getElementById('subm-deadline').value;
            if(!title || !deadline) return alert("提出物名と締め切り日を入力してください");

            await db.collection("submissions").doc(editingSubmId).update({
                title: title,
                deadline: deadline
            });
            alert("更新しました");
            cancelSubmEdit();
        }

        function cancelSubmEdit() {
            editingSubmId = null;
            document.getElementById('subm-title').value = "";
            document.getElementById('subm-deadline').value = "";
            document.getElementById('subm-add-btn').style.display = 'inline-block';
            document.getElementById('subm-update-btn').style.display = 'none';
            document.getElementById('subm-cancel-btn').style.display = 'none';
        }

        async function deleteSubmission(id) {
            if(confirm("この提出物を削除しますか？")) {
                await db.collection("submissions").doc(id).delete();
            }
        }

        document.getElementById('post-blog-btn').onclick = async () => {
            const content = document.getElementById('blog-input').value; 
            if(!content) return;
            await db.collection("blogs").add({ 
                content, 
                createdAt: firebase.firestore.FieldValue.serverTimestamp() 
            });
            document.getElementById('blog-input').value = ""; 
            alert("投稿しました");
        };

        function startEditBlog(id, content, isoDate) {
            editingBlogId = id;
            document.getElementById('edit-blog-input').value = content;
            document.getElementById('edit-blog-date').value = isoDate;
            document.getElementById('blog-edit-form').style.display = 'block';
            document.getElementById('blog-admin-form').style.display = 'none';
            document.getElementById('blog-edit-form').scrollIntoView({behavior: "smooth"});
        }

        async function updateBlog() {
            const content = document.getElementById('edit-blog-input').value;
            const dateStr = document.getElementById('edit-blog-date').value;
            if(!content || !dateStr) return alert("内容と日時を入力してください");

            const newDate = new Date(dateStr);
            await db.collection("blogs").doc(editingBlogId).update({
                content: content,
                createdAt: firebase.firestore.Timestamp.fromDate(newDate)
            });
            alert("記事を更新しました");
            cancelBlogEdit();
        }

        function cancelBlogEdit() {
            editingBlogId = null;
            document.getElementById('edit-blog-input').value = "";
            document.getElementById('edit-blog-date').value = "";
            document.getElementById('blog-edit-form').style.display = 'none';
            document.getElementById('blog-admin-form').style.display = 'block';
        }

        async function deleteBlog(id) {
            if(confirm("この記事を削除しますか？")) {
                await db.collection("blogs").doc(id).delete();
            }
        }

        // --- 名簿管理（追加・表内直接編集・削除） ---
        async function loadStudentList() {
            const snap = await db.collection("students").get();
            let html = "<table><tr><th>氏名</th><th>メールアドレス</th><th>操作</th></tr>";
            snap.forEach(doc => { 
                const d = doc.data();
                const safeId = doc.id.replace(/[@.]/g, '_');
                html += `<tr id="row-${safeId}">
                            <td id="name-td-${safeId}">${d.name}</td>
                            <td>${doc.id}</td>
                            <td id="action-td-${safeId}">
                                <button onclick="startInlineEditStudent('${safeId}', '${doc.id}', '${d.name}')">編集</button>
                                <button onclick="deleteStudent('${doc.id}')">削除</button>
                            </td>
                         </tr>`; 
            });
            document.getElementById('student-list-area').innerHTML = html + "</table>";
        }

        function startInlineEditStudent(safeId, email, currentName) {
            const nameTd = document.getElementById(`name-td-${safeId}`);
            const actionTd = document.getElementById(`action-td-${safeId}`);
            
            nameTd.innerHTML = `<input type="text" id="input-name-${safeId}" value="${currentName}" style="width:90%; padding:4px; margin:0;">`;
            
            actionTd.innerHTML = `
                <button onclick="saveInlineEditStudent('${email}', '${safeId}')">保存</button>
                <button onclick="loadStudentList()">キャンセル</button>
            `;
        }

        async function saveInlineEditStudent(email, safeId) {
            const newName = document.getElementById(`input-name-${safeId}`).value.trim();
            if (!newName) return alert("氏名を入力してください");
            
            await db.collection("students").doc(email).update({ name: newName });
            alert("氏名を更新しました");
            loadStudentList(); 
        }

        async function registerDirect() {
            const email = document.getElementById('direct-email').value.trim();
            const name = document.getElementById('direct-name').value.trim();
            if(!email || !name) return alert("メールアドレスと氏名を入力してください");
            
            await db.collection("students").doc(email).set({ name });
            document.getElementById('direct-email').value = ""; 
            document.getElementById('direct-name').value = "";
            loadStudentList();
            alert("新規登録しました");
        }

        async function deleteStudent(id) {
            if(confirm("この生徒を名簿から削除しますか？")) { 
                await db.collection("students").doc(id).delete(); 
                loadStudentList(); 
            }
        }

        async function loadRegularSetting() {
            const day = document.getElementById('reg-day-select').value;
            const doc = await db.collection("config").doc("regular_schedule").get();
            const table = document.getElementById('reg-table'); table.innerHTML = "";
            const data = doc.exists ? (doc.data()[day] || []) : [];
            for (let i = 0; i < 6; i++) {
                let opts = SUBJECTS.map(s => `<option value="${s}" ${s===(data[i]||"")?'selected':''}>${s||"（空欄）"}</option>`).join('');
                table.innerHTML += `<tr><td>${i+1}</td><td><select id="reg-sub-${i}">${opts}</select></td></tr>`;
            }
        }
        async function saveRegularSetting() {
            const day = document.getElementById('reg-day-select').value;
            const lessons = Array.from({length:6}, (_, i) => document.getElementById(`reg-sub-${i}`).value);
            await db.collection("config").doc("regular_schedule").set({ [day]: lessons }, { merge: true });
            alert("保存しました"); displayNextSchoolDays();
        }
        async function saveVacation() {
            const s = document.getElementById('vac-start').value, e = document.getElementById('vac-end').value;
            if(!s || !e) return;
            vacationData.push({ start: s, end: e });
            await db.collection("config").doc("vacations").set({ periods: vacationData });
            renderVacationList(); displayNextSchoolDays();
        }
        function renderVacationList() {
            document.getElementById('vacation-list').innerHTML = vacationData.map((v, i) => 
                `${v.start} 〜 ${v.end} <button onclick="deleteVac(${i})">削除</button>`).join('<br>');
        }
        async function deleteVac(i) { vacationData.splice(i,1); await db.collection("config").doc("vacations").set({ periods: vacationData }); renderVacationList(); displayNextSchoolDays(); }

        async function loadScheduleEdit() {
            const date = document.getElementById('edit-date-select').value; if(!date) return;
            const doc = await db.collection("schedules").doc(date).get();
            const table = document.getElementById('edit-table'); table.innerHTML = "";
            let data = doc.exists ? doc.data() : null;
            if(!data) {
                const dayNum = new Date(date).getDay();
                const regDoc = await db.collection("config").doc("regular_schedule").get();
                const regData = regDoc.exists ? regDoc.data()[["sun", "mon", "tue", "wed", "thu", "fri", "sat"][dayNum]] : null;
                data = { lessons: Array.from({length:6}, (_, i) => ({ sub: regData?.[i] || "", note: "" })), exitTime: "16:30" };
            }
            data.lessons.forEach((l, i) => {
                let opts = SUBJECTS.map(s => `<option value="${s}" ${s===l.sub?'selected':''}>${s||"（空欄）"}</option>`).join('');
                table.innerHTML += `<tr><td>${i+1}</td><td><select id="edit-sub-${i}">${opts}</select></td><td><input type="text" id="edit-note-${i}" value="${l.note}"></td></tr>`;
            });
            initExitTimeOptions(document.getElementById('edit-exit-time'));
            document.getElementById('edit-exit-time').value = data.exitTime;
            document.getElementById('edit-form').style.display = "block";
        }
        async function saveSchedule() {
            const date = document.getElementById('edit-date-select').value;
            const lessons = Array.from({length:6}, (_, i) => ({ sub: document.getElementById(`edit-sub-${i}`).value, note: document.getElementById(`edit-note-${i}`).value }));
            await db.collection("schedules").doc(date).set({ lessons, exitTime: document.getElementById('edit-exit-time').value, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
            alert("保存しました"); displayNextSchoolDays();
        }

        document.getElementById('change-pw-btn').onclick = async () => {
            const user = firebase.auth().currentUser;
            const oldPw = document.getElementById('old-password').value;
            const newPw = document.getElementById('new-password').value;
            if(!oldPw || !newPw) return alert("入力してください");
            try {
                await user.reauthenticateWithCredential(firebase.auth.EmailAuthProvider.credential(user.email, oldPw));
                await user.updatePassword(newPw);
                alert("パスワードを変更しました");
                document.getElementById('old-password').value = ""; document.getElementById('new-password').value = "";
            } catch (e) { alert("変更に失敗しました。現在のパスワードを確認してください。"); }
        };

    </script>
</body>
