<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>３年３組 学級管理システム</title>
    <style>
        /* ＭＳ ゴシックを基調としたスタイル */
        body { 
            background-color: white; 
            color: black; 
            font-family: "MS UI Gothic", "MS Gothic", "Osaka", sans-serif; 
            line-height: 1.5; 
            padding: 20px; 
            max-width: 850px; 
            margin: 0 auto; 
        }
        h1, h2, h3 { 
            font-weight: bold;
            border-bottom: 1px solid black; 
            margin-top: 25px;
            padding-bottom: 5px;
        }
        section { margin-bottom: 40px; border: 1px solid #000; padding: 20px; }
        input, textarea { 
            width: 100%; max-width: 500px; padding: 8px; margin-bottom: 10px; 
            border: 1px solid #000; box-sizing: border-box; font-family: inherit;
        }
        button { 
            padding: 8px 15px; cursor: pointer; background: white; color: black; 
            border: 1px solid black; font-weight: bold; font-family: inherit;
            margin-right: 5px; margin-bottom: 5px;
        }
        button:hover { background: #eeeeee; }
        
        .flex-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; align-items: center; }
        .post-item { border-bottom: 1px dashed #000; padding: 15px 0; }
        .post-date { font-size: 0.8em; color: #444; margin-bottom: 5px; }
        .update-stamp { font-size: 0.9em; margin-left: 10px; font-weight: normal; }
        .edit-area { background: #f0f0f0; padding: 10px; border: 1px solid #000; margin-top: 10px; display: none; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        th, td { border: 1px solid black; padding: 8px; text-align: left; }
        th { background: #f2f2f2; }
        
        .btn-small { font-size: 0.8em; padding: 4px 8px; }
        .btn-red { color: red; border-color: red; }
        .btn-blue { color: blue; border-color: blue; }
        .admin-form-box { background: #f9f9f9; padding: 15px; border: 1px solid #000; margin-bottom: 20px; }
        
        /* ログエリアの初期状態は非表示 */
        #log-area { display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-section" style="text-align: center; margin-top: 50px;">
        <h1>学級管理システム ログイン</h1>
        <input type="email" id="login-email" placeholder="メールアドレス"><br>
        <input type="password" id="login-password" placeholder="パスワード"><br>
        <button type="button" id="login-btn">ログイン</button>
        <p id="error-message" style="color:red; font-weight:bold;"></p>
    </div>

    <div id="main-content" style="display: none;">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 id="welcome-msg" style="border:none; margin:0;">確認中...</h2>
            <button id="logout-btn">ログアウト</button>
        </header>

        <main>
            <section>
                <h2>今週の予定 <span id="last-update-time" class="update-stamp"></span></h2>
                <div id="schedule-display"><p id="schedule-text" style="white-space: pre-wrap;"></p></div>
                <div id="schedule-edit" style="display: none;">
                    <textarea id="schedule-input"></textarea><br>
                    <button id="update-schedule-btn">予定を保存更新</button>
                </div>
            </section>

            <section>
                <h2>担任ブログ</h2>
                <div id="blog-admin-form" style="display: none;" class="admin-form-box">
                    <textarea id="blog-input" placeholder="投稿内容を入力してください"></textarea><br>
                    <button id="post-blog-btn">ブログを投稿する</button>
                </div>
                <div id="blog-list">取得中...</div>
            </section>

            <section id="admin-section" style="display: none; border: 3px double #000;">
                <h2 style="background: #000; color: #fff; padding: 5px;">管理者専用メニュー</h2>
                
                <h3>名簿管理・直接登録</h3>
                <div class="admin-form-box">
                    <div class="flex-row">
                        <input type="email" id="direct-email" placeholder="メールアドレス" style="max-width:250px;">
                        <input type="text" id="direct-name" placeholder="氏名" style="max-width:150px;">
                        <button id="direct-reg-btn">登録・更新</button>
                    </div>
                    <hr>
                    <input type="file" id="csv-file" accept=".csv" style="display:block;">
                    <div class="flex-row">
                        <button id="import-csv-btn">名簿インポート(CSV)</button>
                        <button id="export-student-btn">名簿エクスポート(CSV)</button>
                    </div>
                </div>

                <h3>登録状況一覧</h3>
                <div id="student-list-area"></div>

                <h3>アクセスログ</h3>
                <button id="toggle-log-btn">ログを表示する</button>
                <div id="log-area">
                    <table>
                        <thead><tr><th>日時</th><th>利用者（氏名・メール）</th></tr></thead>
                        <tbody id="log-table-body"></tbody>
                    </table>
                </div>
            </section>

            <section>
                <h2>設定（パスワード変更）</h2>
                <div style="max-width:400px;">
                    <p style="font-size:0.8em; margin-bottom:5px;">※コピー＆ペーストは禁止されています。手入力してください。</p>
                    <input type="password" id="old-password" placeholder="現在のパスワード" onpaste="return false;"><br>
                    <input type="password" id="new-password" placeholder="新しいパスワード（6文字以上）" onpaste="return false;"><br>
                    <input type="password" id="new-password-confirm" placeholder="新しいパスワード（確認用再入力）" onpaste="return false;"><br>
                    <button id="change-pw-btn">パスワードを変更・確定する</button>
                </div>
                <p id="pw-msg" style="font-size:0.9em; margin-top:10px; font-weight:bold;"></p>
            </section>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC7R6Hbgt3C6iq_ozLM6FF6DBGA65j6dd0",
            authDomain: "my-class-site.firebaseapp.com",
            projectId: "my-class-site",
            storageBucket: "my-class-site.firebasestorage.app",
            messagingSenderId: "125594983188",
            appId: "1:125594983188:web:129aa54e9d3a39ca700001"
        };
        const TEACHER_EMAIL = "administrator@class.jp";

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let studentMaster = {};

        document.getElementById('login-btn').onclick = () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            firebase.auth().signInWithEmailAndPassword(email, pass).then(res => initApp(res.user)).catch(err => { document.getElementById('error-message').innerText = "ログイン失敗"; });
        };

        async function initApp(user) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';

            try {
                const userDoc = await db.collection("students").doc(user.email).get();
                if (userDoc.exists) {
                    document.getElementById('welcome-msg').innerText = userDoc.data().name + " さん、おかえりなさい";
                } else {
                    document.getElementById('welcome-msg').innerText = "未登録ユーザー さん、おかえりなさい";
                }
            } catch (e) {
                document.getElementById('welcome-msg').innerText = "ログイン完了 (" + user.email + ")";
            }

            db.collection("config").doc("weekly_schedule").onSnapshot(doc => {
                if(doc.exists) {
                    const data = doc.data();
                    document.getElementById('schedule-text').innerText = data.text;
                    document.getElementById('schedule-input').value = data.text;
                    if(data.updatedAt) {
                        const date = data.updatedAt.toDate();
                        const dateStr = (date.getMonth() + 1) + "/" + date.getDate() + " " + date.getHours().toString().padStart(2, '0') + ":" + date.getMinutes().toString().padStart(2, '0');
                        document.getElementById('last-update-time').innerText = dateStr + " 更新";
                    }
                }
            });

            db.collection("blogs").orderBy("createdAt", "desc").limit(20).onSnapshot(snap => {
                const list = document.getElementById('blog-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    const id = d.id;
                    const date = data.createdAt ? data.createdAt.toDate().toLocaleString('ja-JP') : "日時不明";
                    let html = `<div class="post-item">
                        <div class="post-date">${date}</div>
                        <div>${data.content.replace(/\n/g, '<br>')}</div>`;
                    if (user.email === TEACHER_EMAIL) {
                        html += `
                        <div id="edit-area-${id}" class="edit-area">
                            <textarea id="edit-input-${id}" style="width:100%">${data.content}</textarea>
                            <button class="btn-small" onclick="saveBlogEdit('${id}')">更新</button>
                            <button class="btn-small" onclick="toggleEdit('${id}')">戻る</button>
                        </div>
                        <div class="flex-row" style="margin-top:10px;">
                            <button class="btn-small" onclick="toggleEdit('${id}')">編集</button>
                            <button class="btn-small btn-red" onclick="deleteBlog('${id}')">削除</button>
                        </div>`;
                    }
                    html += `</div>`;
                    list.innerHTML += html;
                });
            });

            if (user.email === TEACHER_EMAIL) {
                document.getElementById('admin-section').style.display = 'block';
                document.getElementById('schedule-edit').style.display = 'block';
                document.getElementById('blog-admin-form').style.display = 'block';
                document.getElementById('toggle-log-btn').onclick = toggleLogs;
                document.getElementById('direct-reg-btn').onclick = registerDirect;
                loadStudentList();
                
                const studentSnap = await db.collection("students").get();
                studentSnap.forEach(doc => { studentMaster[doc.id] = doc.data().name; });
            }

            db.collection("access_logs").add({ email: user.email, loginTime: firebase.firestore.FieldValue.serverTimestamp() });
        }

        // 名簿一覧表示（編集ボタン付き）
        async function loadStudentList() {
            const snap = await db.collection("students").get();
            let html = "<table><tr><th>名前</th><th>メール</th><th>操作</th></tr>";
            snap.forEach(doc => {
                const email = doc.id;
                const name = doc.data().name;
                html += `<tr id="row-${email.replace(/[@.]/g, '-')}">
                    <td class="name-cell">${name}</td>
                    <td>${email}</td>
                    <td>
                        <button class="btn-small btn-blue" onclick="editStudentRow('${email}', '${name}')">編集</button>
                        <button class="btn-small btn-red" onclick="deleteStudent('${email}')">削除</button>
                    </td>
                </tr>`;
            });
            document.getElementById('student-list-area').innerHTML = html + "</table>";
        }

        // 名簿の行を編集モードにする
        function editStudentRow(email, currentName) {
            const rowId = `row-${email.replace(/[@.]/g, '-')}`;
            const row = document.getElementById(rowId);
            row.innerHTML = `
                <td><input type="text" id="edit-name-${rowId}" value="${currentName}" style="margin-bottom:0; width:120px;"></td>
                <td>${email}</td>
                <td>
                    <button class="btn-small" onclick="saveStudentEdit('${email}', '${rowId}')">保存</button>
                    <button class="btn-small" onclick="loadStudentList()">取消</button>
                </td>
            `;
        }

        // 名簿編集の保存
        async function saveStudentEdit(email, rowId) {
            const newName = document.getElementById(`edit-name-${rowId}`).value.trim();
            if(!newName) return alert("名前を入力してください");
            await db.collection("students").doc(email).update({ name: newName });
            studentMaster[email] = newName;
            alert("更新しました");
            loadStudentList();
        }

        async function deleteStudent(email) {
            if(confirm("削除しますか？")) { 
                await db.collection("students").doc(email).delete(); 
                delete studentMaster[email];
                loadStudentList(); 
            }
        }

        // ログ表示・非表示切り替え
        function toggleLogs() {
            const area = document.getElementById('log-area');
            const btn = document.getElementById('toggle-log-btn');
            if (area.style.display === 'block') {
                area.style.display = 'none';
                btn.innerText = "ログを表示する";
            } else {
                area.style.display = 'block';
                btn.innerText = "ログを非表示にする";
                loadLogs();
            }
        }

        async function loadLogs() {
            const tbody = document.getElementById('log-table-body');
            tbody.innerHTML = "取得中...";
            const snap = await db.collection("access_logs").orderBy("loginTime", "desc").limit(30).get();
            tbody.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const time = d.loginTime ? d.loginTime.toDate().toLocaleString() : "---";
                const displayName = studentMaster[d.email] ? `${studentMaster[d.email]} (${d.email})` : d.email;
                tbody.innerHTML += `<tr><td>${time}</td><td>${displayName}</td></tr>`;
            });
        }

        // パスワード変更
        document.getElementById('change-pw-btn').onclick = async () => {
            const user = firebase.auth().currentUser;
            const oldPw = document.getElementById('old-password').value;
            const newPw = document.getElementById('new-password').value;
            const confirmPw = document.getElementById('new-password-confirm').value;
            const msg = document.getElementById('pw-msg');
            if(!oldPw || !newPw || !confirmPw) return alert("全項目入力してください");
            if(newPw !== confirmPw) return alert("確認用パスワードが一致しません");
            try {
                const cred = firebase.auth.EmailAuthProvider.credential(user.email, oldPw);
                await user.reauthenticateWithCredential(cred);
                await user.updatePassword(newPw);
                msg.style.color = "blue"; msg.innerText = "完了";
                document.getElementById('old-password').value = "";
                document.getElementById('new-password').value = "";
                document.getElementById('new-password-confirm').value = "";
            } catch (err) { msg.style.color = "red"; msg.innerText = "失敗（パスワード相違など）"; }
        };

        async function registerDirect() {
            const email = document.getElementById('direct-email').value.trim();
            const name = document.getElementById('direct-name').value.trim();
            if(!email || !name) return alert("入力してください");
            await db.collection("students").doc(email).set({ name: name });
            studentMaster[email] = name;
            loadStudentList();
        }

        function toggleEdit(id) {
            const area = document.getElementById(`edit-area-${id}`);
            area.style.display = (area.style.display === 'block') ? 'none' : 'block';
        }
        async function saveBlogEdit(id) {
            const newContent = document.getElementById(`edit-input-${id}`).value;
            await db.collection("blogs").doc(id).update({ content: newContent, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
            alert("更新完了");
        }
        async function deleteBlog(id) {
            if(confirm("削除しますか？")) await db.collection("blogs").doc(id).delete();
        }

        document.getElementById('export-student-btn').onclick = async () => {
            const snap = await db.collection("students").get();
            let csv = "メールアドレス,名前\n";
            snap.forEach(doc => { csv += `${doc.id},${doc.data().name}\n`; });
            const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: "text/csv" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "student_list.csv"; a.click();
        };

        document.getElementById('import-csv-btn').onclick = () => {
            const file = document.getElementById('csv-file').files[0];
            if(!file) return alert("選択してください");
            const reader = new FileReader();
            reader.onload = async (e) => {
                const rows = e.target.result.split("\n");
                for(let row of rows) {
                    const cols = row.split(",");
                    if(cols.length >= 2 && cols[0].includes("@")) {
                        await db.collection("students").doc(cols[0].trim()).set({ name: cols[1].trim() });
                    }
                }
                alert("完了"); loadStudentList();
            };
            reader.readAsText(file);
        };

        document.getElementById('update-schedule-btn').onclick = () => {
            db.collection("config").doc("weekly_schedule").set({ 
                text: document.getElementById('schedule-input').value, 
                updatedAt: firebase.firestore.FieldValue.serverTimestamp() 
            }).then(() => alert("保存しました"));
        };

        document.getElementById('post-blog-btn').onclick = () => {
            const content = document.getElementById('blog-input').value;
            if(!content) return;
            db.collection("blogs").add({ content: content, createdAt: firebase.firestore.FieldValue.serverTimestamp() })
              .then(() => { document.getElementById('blog-input').value = ""; alert("投稿しました"); });
        };

        document.getElementById('logout-btn').onclick = () => { location.reload(); };
    </script>
</body>
</html>
