<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Class Portal</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 950px; margin: 0 auto; background: #f4f4f4; }
        section { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #ccc; }
        .flex-container { display: flex; gap: 20px; flex-wrap: wrap; }
        .schedule-card { flex: 1; min-width: 300px; border: 2px solid #333; padding: 15px; border-radius: 10px; background: #fff; }
        .today-card { border-color: #ff5722; background: #fff9f7; }
        .tomorrow-card { border-color: #2196f3; background: #f7fbff; }
        
        table.sch-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        table.sch-table th, table.sch-table td { border: 1px solid #999; padding: 5px; text-align: center; }
        .note-cell { text-align: left !important; font-size: 0.9em; background: #fdfdfd; }
        
        .admin-edit-table { width: 100%; background: #eee; padding: 10px; border-radius: 5px; }
        .unread-list { color: red; font-size: 0.8em; font-weight: bold; }
        .hidden { display: none; }
        select, input, textarea { padding: 5px; font-size: 1em; }
        button { padding: 10px 15px; cursor: pointer; border-radius: 5px; border: 1px solid #333; font-weight: bold; }
        .btn-post { background: #4caf50; color: white; border: none; }
    </style>
</head>
<body>

    <div id="login-section" style="text-align: center; margin-top: 100px;">
        <h1>3-3 ログイン</h1>
        <input type="email" id="login-email" placeholder="メールアドレス"><br><br>
        <input type="password" id="login-password" placeholder="パスワード"><br><br>
        <button id="login-btn">ログイン</button>
    </div>

    <div id="main-content" class="hidden">
        <header style="display:flex; justify-content:space-between;">
            <h2 id="welcome-msg">ようこそ</h2>
            <button onclick="location.reload()">ログアウト</button>
        </header>

        <section>
            <h2>スケジュール確認</h2>
            <div class="flex-container" id="daily-display">
                <div id="today-area" class="schedule-card today-card">読み込み中...</div>
                <div id="tomorrow-area" class="schedule-card tomorrow-card">読み込み中...</div>
            </div>
            <div id="read-confirm-area" style="margin-top:15px; text-align:right;">
                <button id="read-btn" class="btn-post">この記事を確認しました（既読）</button>
            </div>
        </section>

        <section id="admin-area" class="hidden">
            <h2 style="color: blue;">予定編集（最大5週先まで）</h2>
            <div class="admin-form-box">
                日付を選択：<input type="date" id="edit-date-select"> 
                <button onclick="loadEditData()">編集データ呼出</button>
                <hr>
                <div id="edit-form" class="hidden">
                    <table class="sch-table admin-edit-table">
                        <tr><th>校時</th><th>科目</th><th>備考・持ち物</th></tr>
                        <tbody id="edit-table-body">
                            </tbody>
                    </table>
                    <div style="margin-top:10px;">
                        最終下校時刻：<input type="time" id="edit-exit-time" value="16:30"><br><br>
                        <button class="btn-post" onclick="saveSchedule()">この日の予定を保存・更新</button>
                    </div>
                </div>
                <div id="unread-monitor" style="margin-top:20px; border-top:1px solid #ccc; padding-top:10px;">
                    <strong>未読生徒一覧：</strong>
                    <div id="unread-names" class="unread-list">---</div>
                </div>
            </div>
        </section>

        <section>
            <h2>📝 連絡ブログ</h2>
            <div id="blog-list"></div>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
 	   apiKey: "AIzaSyC7R6Hbgt3C6iq_ozLM6FF6DBGA65j6dd0",
 	   authDomain: "my-class-site.firebaseapp.com",
  	   databaseURL: "https://my-class-site-default-rtdb.firebaseio.com",
 	   projectId: "my-class-site",
 	   storageBucket: "my-class-site.firebasestorage.app",
 	   messagingSenderId: "125594983188",
 	   appId: "1:125594983188:web:129aa54e9d3a39ca700001",
 	   measurementId: "G-4EQ3Z9Q4NT"
};

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const TEACHER_EMAIL = "administrator@class.jp";
        const SUBJECTS = ["国語", "社会", "数学", "理科", "英語", "音楽", "美術", "保体", "技家", "学活", "総合", "道徳", "放課後"];

        let currentUserEmail = "";
        let studentList = {}; // 全生徒のリスト {email: name}

        // ログイン処理
        document.getElementById('login-btn').onclick = () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            firebase.auth().signInWithEmailAndPassword(email, pass).then(res => {
                currentUserEmail = res.user.email;
                initApp();
            }).catch(e => alert("ログイン失敗"));
        };

        async function initApp() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');

            // 生徒名簿取得
            const sSnap = await db.collection("students").get();
            sSnap.forEach(d => studentList[d.id] = d.data().name);
            document.getElementById('welcome-msg').innerText = `${studentList[currentUserEmail] || "先生"} さん、こんにちは`;

            if (currentUserEmail === TEACHER_EMAIL) {
                document.getElementById('admin-area').classList.remove('hidden');
            }

            // 今日・明日の表示
            displayDailySchedule();
            loadBlogs();
        }

        // 今日・明日の日付文字列取得 (YYYY-MM-DD)
        function getDateStr(offset = 0) {
            const d = new Date();
            d.setDate(d.getDate() + offset);
            return d.toISOString().split('T')[0];
        }

        async function displayDailySchedule() {
            const today = getDateStr(0);
            const tomorrow = getDateStr(1);

            renderCard(today, "today-area", "【今日】 " + today);
            renderCard(tomorrow, "tomorrow-area", "【明日】 " + tomorrow);
            
            // 既読ボタンの動作
            document.getElementById('read-btn').onclick = () => markAsRead(today, tomorrow);
        }

        async function renderCard(dateStr, elementId, title) {
            const doc = await db.collection("schedules").doc(dateStr).get();
            const el = document.getElementById(elementId);
            if (!doc.exists) {
                el.innerHTML = `<h3>${title}</h3><p>予定が未登録です</p>`;
                return;
            }
            const data = doc.data();
            let tableHtml = `<h3>${title}</h3><table class="sch-table">`;
            for (let i = 1; i <= 6; i++) {
                const s = data.lessons[i-1];
                tableHtml += `<tr><td>${i}</td><td>${s.subject}</td><td class="note-cell">${s.note || "いつも通り"}</td></tr>`;
            }
            tableHtml += `</table><p><strong>最終下校：${data.exitTime || "16:30"}</strong></p>`;
            el.innerHTML = tableHtml;
        }

        async function markAsRead(d1, d2) {
            // 今日と明日の両方に既読をつける
            const batch = db.batch();
            [d1, d2].forEach(d => {
                const ref = db.collection("schedules").doc(d);
                batch.update(ref, { viewedBy: firebase.firestore.FieldValue.arrayUnion(currentUserEmail) });
            });
            await batch.commit();
            alert("既読として記録しました");
        }

        // 管理者用：編集データ読み込み
        async function loadEditData() {
            const date = document.getElementById('edit-date-select').value;
            if (!date) return;
            const doc = await db.collection("schedules").doc(date).get();
            const container = document.getElementById('edit-table-body');
            container.innerHTML = "";
            
            const data = doc.exists ? doc.data() : null;
            
            for (let i = 1; i <= 6; i++) {
                const lesson = data ? data.lessons[i-1] : { subject: "国語", note: "" };
                let options = SUBJECTS.map(s => `<option value="${s}" ${s === lesson.subject ? 'selected' : ''}>${s}</option>`).join('');
                container.innerHTML += `
                    <tr>
                        <td>${i}</td>
                        <td><select id="edit-sub-${i}">${options}</select></td>
                        <td><input type="text" id="edit-note-${i}" value="${lesson.note}" placeholder="いつも通り" style="width:90%"></td>
                    </tr>`;
            }
            document.getElementById('edit-exit-time').value = data ? data.exitTime : "16:30";
            document.getElementById('edit-form').classList.remove('hidden');

            // 未読者の表示
            if (data && data.viewedBy) {
                const unread = Object.keys(studentList).filter(email => !data.viewedBy.includes(email));
                document.getElementById('unread-names').innerText = unread.map(e => studentList[e]).join(", ") || "全員既読です！";
            } else {
                document.getElementById('unread-names').innerText = "未登録、または既読者なし";
            }
        }

        async function saveSchedule() {
            const date = document.getElementById('edit-date-select').value;
            const lessons = [];
            for (let i = 1; i <= 6; i++) {
                lessons.push({
                    subject: document.getElementById(`edit-sub-${i}`).value,
                    note: document.getElementById(`edit-note-${i}`).value
                });
            }
            const exitTime = document.getElementById('edit-exit-time').value;

            // 新規保存時は既読リストを空で初期化（更新時は既存を保持したいが、基本は上書き）
            const doc = await db.collection("schedules").doc(date).get();
            const viewedBy = doc.exists ? doc.data().viewedBy : [];

            await db.collection("schedules").doc(date).set({
                lessons, exitTime, viewedBy, updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert(date + " の予定を保存しました");
            displayDailySchedule();
        }

        async function loadBlogs() { /* 以前のブログ読み込み処理 */ }
    </script>
</body>
</html>
