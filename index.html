<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3年3組 学級管理システム</title>
    <style>
        /* MS ゴシックを基調としたスタイル */
        body { 
            background-color: white; 
            color: black; 
            font-family: "MS UI Gothic", "MS Gothic", "Osaka", sans-serif; 
            line-height: 1.4; 
            padding: 20px; 
            max-width: 800px; 
            margin: 0 auto; 
        }
        h1, h2, h3 { 
            font-weight: bold;
            border-bottom: 1px solid black; 
            margin-top: 20px;
        }
        section { margin-bottom: 30px; border: 1px solid #000; padding: 15px; }
        input, textarea { 
            width: 100%; max-width: 500px; padding: 5px; margin-bottom: 10px; 
            border: 1px solid #000; box-sizing: border-box; font-family: inherit;
        }
        button { 
            padding: 5px 15px; cursor: pointer; background: white; color: black; 
            border: 1px solid black; font-family: inherit;
        }
        button:hover { background: #eee; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        th, td { border: 1px solid black; padding: 5px; text-align: left; }
        th { background: #eee; }
        .post-item { border-bottom: 1px dashed #000; padding: 10px 0; }
        .post-date { font-size: 0.8em; }
    </style>
</head>
<body>

    <div id="login-section" style="text-align: center; margin-top: 50px;">
        <h1>学級管理システム ログイン</h1>
        <input type="email" id="login-email" placeholder="メールアドレス"><br>
        <input type="password" id="login-password" placeholder="パスワード"><br>
        <button type="button" id="login-btn">ログイン</button>
        <p id="error-message" style="color:red;"></p>
    </div>

    <div id="main-content" style="display: none;">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 id="welcome-msg" style="border:none;">確認中...</h2>
            <button id="logout-btn">ログアウト</button>
        </header>

        <main>
            <section>
                <h2>今週の予定</h2>
                <div id="schedule-display"><p id="schedule-text" style="white-space: pre-wrap;"></p></div>
                <div id="schedule-edit" style="display: none;">
                    <textarea id="schedule-input"></textarea><br>
                    <button id="update-schedule-btn">予定を保存</button>
                </div>
            </section>

            <section>
                <h2>担任ブログ</h2>
                <div id="blog-admin-form" style="display: none; background: #f0f0f0; padding: 10px; margin-bottom: 10px;">
                    <textarea id="blog-input" placeholder="投稿内容を入力"></textarea><br>
                    <button id="post-blog-btn">ブログを投稿</button>
                </div>
                <div id="blog-list">投稿を取得しています...</div>
            </section>

            <section id="admin-section" style="display: none; border: 2px solid black;">
                <h2>管理者メニュー</h2>
                <h3>名簿管理</h3>
                <input type="file" id="csv-file" accept=".csv"><br>
                <button id="import-csv-btn">名簿インポート (CSV)</button>
                
                <h3>データ出力</h3>
                <button id="export-log-btn">アクセスログをCSVでエクスポート</button>
                <div id="admin-log-preview" style="margin-top:10px;"></div>
            </section>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC7R6Hbgt3C6iq_ozLM6FF6DBGA65j6dd0",
            authDomain: "my-class-site.firebaseapp.com",
            projectId: "my-class-site",
            storageBucket: "my-class-site.firebasestorage.app",
            messagingSenderId: "125594983188",
            appId: "1:125594983188:web:129aa54e9d3a39ca700001"
        };
        const TEACHER_EMAIL = "administrator@class.jp";

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        document.getElementById('login-btn').onclick = () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            firebase.auth().signInWithEmailAndPassword(email, pass)
                .then(res => initApp(res.user))
                .catch(err => alert("ログイン失敗: " + err.message));
        };

        async function initApp(user) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';

            const userDoc = await db.collection("students").doc(user.email).get();
            const name = userDoc.exists ? userDoc.data().name : "ゲスト";
            document.getElementById('welcome-msg').innerText = name + " さん、おかえりなさい";

            // 予定取得
            db.collection("config").doc("weekly_schedule").onSnapshot(doc => {
                if(doc.exists) {
                    document.getElementById('schedule-text').innerText = doc.data().text;
                    document.getElementById('schedule-input').value = doc.data().text;
                }
            });

            // ブログ取得
            db.collection("blogs").orderBy("createdAt", "desc").limit(15).onSnapshot(snap => {
                const list = document.getElementById('blog-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    const date = data.createdAt ? data.createdAt.toDate().toLocaleString() : "";
                    list.innerHTML += `<div class="post-item"><div class="post-date">${date}</div><div>${data.content}</div></div>`;
                });
                if(snap.empty) list.innerHTML = "投稿はありません。";
            });

            if (user.email === TEACHER_EMAIL) {
                document.getElementById('admin-section').style.display = 'block';
                document.getElementById('schedule-edit').style.display = 'block';
                document.getElementById('blog-admin-form').style.display = 'block';
            }

            db.collection("access_logs").add({ email: user.email, loginTime: firebase.firestore.FieldValue.serverTimestamp() });
        }

        // CSVエクスポート機能
        document.getElementById('export-log-btn').onclick = async () => {
            const snap = await db.collection("access_logs").orderBy("loginTime", "desc").get();
            if (snap.empty) return alert("出力するデータがありません。");

            let csvContent = "日時,メールアドレス\n";
            snap.forEach(doc => {
                const d = doc.data();
                const time = d.loginTime ? d.loginTime.toDate().toLocaleString() : "不明";
                csvContent += `${time},${d.email}\n`;
            });

            const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: "text/csv;charset=utf-8" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.setAttribute("href", url);
            a.setAttribute("download", "access_log.csv");
            a.click();
        };

        // 予定保存
        document.getElementById('update-schedule-btn').onclick = () => {
            db.collection("config").doc("weekly_schedule").set({
                text: document.getElementById('schedule-input').value,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => alert("保存完了"));
        };

        // ブログ投稿
        document.getElementById('post-blog-btn').onclick = () => {
            const val = document.getElementById('blog-input').value;
            if(!val) return;
            db.collection("blogs").add({
                content: val,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                document.getElementById('blog-input').value = "";
                alert("投稿しました。");
            });
        };

        // 名簿インポート
        document.getElementById('import-csv-btn').onclick = function() {
            const file = document.getElementById('csv-file').files[0];
            if(!file) return alert("ファイルを選択してください");
            const reader = new FileReader();
            reader.onload = async (e) => {
                const rows = e.target.result.split("\n");
                for(let row of rows) {
                    const cols = row.split(",");
                    if(cols.length >= 2 && cols[0].includes("@")) {
                        await db.collection("students").doc(cols[0].trim()).set({ name: cols[1].trim() });
                    }
                }
                alert("インポート完了");
            };
            reader.readAsText(file);
        };

        document.getElementById('logout-btn').onclick = () => { location.reload(); };
    </script>
</body>
</html>
