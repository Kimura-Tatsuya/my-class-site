<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>３年３組 学級管理システム</title>
    <style>
        /* ＭＳ ゴシックを基調としたスタイル */
        body { 
            background-color: white; 
            color: black; 
            font-family: "MS UI Gothic", "MS Gothic", "Osaka", sans-serif; 
            line-height: 1.5; 
            padding: 20px; 
            max-width: 850px; 
            margin: 0 auto; 
        }
        h1, h2, h3 { 
            font-weight: bold;
            border-bottom: 1px solid black; 
            margin-top: 25px;
            padding-bottom: 5px;
        }
        section { margin-bottom: 40px; border: 1px solid #000; padding: 20px; }
        input, textarea, select { 
            width: 100%; max-width: 500px; padding: 8px; margin-bottom: 10px; 
            border: 1px solid #000; box-sizing: border-box; font-family: inherit;
        }
        button { 
            padding: 8px 15px; cursor: pointer; background: white; color: black; 
            border: 1px solid black; font-weight: bold; font-family: inherit;
            margin-right: 5px; margin-bottom: 5px;
        }
        button:hover { background: #eeeeee; }
        
        /* 予定の横並び用レイアウト */
        .day-container { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 10px; }
        .day-box { flex: 1; border: 1px solid #000; padding: 10px; min-width: 300px; }
        .day-label { font-weight: bold; font-size: 1.1em; border-bottom: 1px solid #000; display: block; margin-bottom: 10px; }

        .flex-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; align-items: center; }
        .post-item { border-bottom: 1px dashed #000; padding: 15px 0; }
        .post-date { font-size: 0.8em; color: #444; margin-bottom: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 5px; font-size: 0.9em; }
        th, td { border: 1px solid black; padding: 5px; text-align: center; }
        th { background: #f2f2f2; }
        .note-cell { text-align: left; }

        .admin-form-box { background: #f9f9f9; padding: 15px; border: 1px solid #000; margin-bottom: 20px; }
        .unread-msg { color: red; font-weight: bold; font-size: 0.8em; margin-top: 10px; }
        #log-area { display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-section" style="text-align: center; margin-top: 50px;">
        <h1>学級管理システム ログイン</h1>
        <input type="email" id="login-email" placeholder="メールアドレス"><br>
        <input type="password" id="login-password" placeholder="パスワード"><br>
        <button id="login-btn">ログイン</button>
        <p id="error-message" style="color:red; font-weight:bold;"></p>
    </div>

    <div id="main-content" style="display: none;">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 id="welcome-msg" style="border:none; margin:0;">確認中...</h2>
            <button id="logout-btn">ログアウト</button>
        </header>

        <main>
            <section>
                <h2>本日の予定・明日の予定</h2>
                <div class="day-container">
                    <div id="today-area" class="day-box">読み込み中...</div>
                    <div id="tomorrow-area" class="day-box">読み込み中...</div>
                </div>
            </section>

            <section id="schedule-admin-section" style="display: none; border: 2px solid blue;">
                <h2 style="color: blue;">予定管理（レギュラー・日別編集）</h2>
                
                <details class="admin-form-box">
                    <summary style="cursor:pointer; font-weight:bold;">［設定］標準（レギュラー）の時間割を登録する</summary>
                    <div style="margin-top:10px;">
                        曜日：<select id="reg-day-select" style="max-width:100px;">
                            <option value="mon">月曜日</option><option value="tue">火曜日</option>
                            <option value="wed">水曜日</option><option value="thu">木曜日</option>
                            <option value="fri">金曜日</option>
                        </select>
                        <button onclick="loadRegularSetting()">設定呼出</button>
                        <table id="reg-table" style="max-width:300px;"></table>
                        <button onclick="saveRegularSetting()" style="margin-top:10px;">この曜日の標準を保存</button>
                    </div>
                </details>

                <div class="admin-form-box">
                    <h3>日別の予定作成（5週間先まで対応）</h3>
                    日付選択：<input type="date" id="edit-date-select" style="max-width:200px;">
                    <button onclick="loadScheduleEdit()">編集データ呼出 / 新規作成</button>
                    
                    <div id="edit-form-wrapper" style="display:none; margin-top:15px;">
                        <table>
                            <thead><tr><th>校時</th><th>科目</th><th>備考（空欄なら「いつも通り」）</th></tr></thead>
                            <tbody id="edit-table-body"></tbody>
                        </table>
                        <div style="margin-top:10px;">
                            最終下校時刻：<input type="time" id="edit-exit-time" style="max-width:120px;">
                            <button id="save-sch-btn" style="background:#e3f2fd;">この日の予定を保存・公開</button>
                        </div>
                        <div id="unread-monitor" class="unread-msg"></div>
                    </div>
                </div>
            </section>

            <section>
                <h2>担任ブログ</h2>
                <div id="blog-admin-form" style="display: none;" class="admin-form-box">
                    <textarea id="blog-input" placeholder="投稿内容を入力"></textarea><br>
                    <button id="post-blog-btn">ブログを投稿する</button>
                </div>
                <div id="blog-list">取得中...</div>
            </section>

            <section id="admin-section" style="display: none; border: 3px double #000;">
                <h2 style="background:#000; color:#fff; padding:5px;">名簿・アクセス管理</h2>
                <div class="admin-form-box">
                    <div class="flex-row">
                        <input type="email" id="direct-email" placeholder="メールアドレス" style="max-width:250px;">
                        <input type="text" id="direct-name" placeholder="氏名" style="max-width:150px;">
                        <button id="direct-reg-btn">登録・更新</button>
                    </div>
                </div>
                <div id="student-list-area"></div>
                <button id="toggle-log-btn" style="margin-top:15px;">アクセスログを表示</button>
                <div id="log-area">
                    <table>
                        <thead><tr><th>日時</th><th>利用者</th></tr></thead>
                        <tbody id="log-table-body"></tbody>
                    </table>
                </div>
            </section>

            <section>
                <h2>パスワード変更</h2>
                <div style="max-width:400px;">
                    <input type="password" id="old-password" placeholder="現在のパスワード" onpaste="return false;"><br>
                    <input type="password" id="new-password" placeholder="新しいパスワード（6文字以上）" onpaste="return false;"><br>
                    <input type="password" id="new-password-confirm" placeholder="確認用再入力" onpaste="return false;"><br>
                    <button id="change-pw-btn">パスワードを更新する</button>
                </div>
                <p id="pw-msg" style="font-weight:bold;"></p>
            </section>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC7R6Hbgt3C6iq_ozLM6FF6DBGA65j6dd0",
            authDomain: "my-class-site.firebaseapp.com",
            projectId: "my-class-site",
            storageBucket: "my-class-site.firebasestorage.app",
            messagingSenderId: "125594983188",
            appId: "1:125594983188:web:129aa54e9d3a39ca700001"
        };
        const TEACHER_EMAIL = "administrator@class.jp";
        const SUBJECT_LIST = ["国語", "社会", "数学", "理科", "英語", "音楽", "美術", "保体", "技家", "学活", "総合", "道徳", "行事"];

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let studentMaster = {};

        // ログイン
        document.getElementById('login-btn').onclick = () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            firebase.auth().signInWithEmailAndPassword(email, pass).then(res => initApp(res.user)).catch(() => { document.getElementById('error-message').innerText="ログイン失敗"; });
        };

        async function initApp(user) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';

            // 名簿/ログイン時間同期
            const sSnap = await db.collection("students").get();
            sSnap.forEach(doc => { studentMaster[doc.id] = { name: doc.data().name, lastLogin: doc.data().lastLogin ? doc.data().lastLogin.toDate() : null }; });

            document.getElementById('welcome-msg').innerText = (studentMaster[user.email]?.name || "先生") + " さん、こんにちは";
            await db.collection("students").doc(user.email).update({ lastLogin: firebase.firestore.FieldValue.serverTimestamp() });

            // 予定表表示
            refreshDailyDisplay();

            // ブログ取得
            db.collection("blogs").orderBy("createdAt", "desc").limit(20).onSnapshot(snap => {
                const list = document.getElementById('blog-list'); list.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    list.innerHTML += `<div class="post-item"><div class="post-date">${data.createdAt?.toDate().toLocaleString() || ""}</div><div>${data.content.replace(/\n/g, '<br>')}</div></div>`;
                });
            });

            if (user.email === TEACHER_EMAIL) {
                document.getElementById('schedule-admin-section').style.display = 'block';
                document.getElementById('admin-section').style.display = 'block';
                document.getElementById('blog-admin-form').style.display = 'block';
                loadStudentList();
                loadRegularSetting();
            }
            db.collection("access_logs").add({ email: user.email, loginTime: firebase.firestore.FieldValue.serverTimestamp() });
        }

        // --- 予定表：表示ロジック ---
        function getISODate(offset = 0) {
            const d = new Date(); d.setDate(d.getDate() + offset);
            return d.toISOString().split('T')[0];
        }
        function getDisplayLabel(offset) {
            const d = new Date(); d.setDate(d.getDate() + offset);
            const weeks = ["日", "月", "火", "水", "木", "金", "土"];
            const prefix = (offset === 0) ? "【今日】" : (offset === 1) ? "【明日】" : "";
            return `${prefix} ${d.getMonth()+1}/${d.getDate()} (${weeks[d.getDay()]}) の予定`;
        }
        async function refreshDailyDisplay() {
            renderDay(getISODate(0), "today-area", getDisplayLabel(0));
            renderDay(getISODate(1), "tomorrow-area", getDisplayLabel(1));
        }
        async function renderDay(date, elId, label) {
            const doc = await db.collection("schedules").doc(date).get();
            const el = document.getElementById(elId);
            if (!doc.exists) { el.innerHTML = `<span class="day-label">${label}</span><p>未登録です</p>`; return; }
            const data = doc.data();
            let html = `<span class="day-label">${label}</span><table><tr><th>校時</th><th>科目</th><th>備考</th></tr>`;
            data.lessons.forEach((l, i) => { html += `<tr><td>${i+1}</td><td>${l.sub}</td><td class="note-cell">${l.note || "いつも通り"}</td></tr>`; });
            html += `</table><p style="text-align:right; margin-top:5px;">最終下校：${data.exitTime}</p>`;
            el.innerHTML = html;
        }

        // --- 管理者：レギュラー設定 ---
        async function loadRegularSetting() {
            const day = document.getElementById('reg-day-select').value;
            const doc = await db.collection("config").doc("regular_schedule").get();
            const table = document.getElementById('reg-table');
            table.innerHTML = "";
            const data = doc.exists ? (doc.data()[day] || []) : [];
            for (let i = 0; i < 6; i++) {
                const sub = data[i] || "国語";
                let opts = SUBJECT_LIST.map(s => `<option value="${s}" ${s===sub?'selected':''}>${s}</option>`).join('');
                table.innerHTML += `<tr><td>${i+1}</td><td><select id="reg-sub-${i}">${opts}</select></td></tr>`;
            }
        }
        async function saveRegularSetting() {
            const day = document.getElementById('reg-day-select').value;
            const lessons = [];
            for (let i = 0; i < 6; i++) { lessons.push(document.getElementById(`reg-sub-${i}`).value); }
            await db.collection("config").doc("regular_schedule").set({ [day]: lessons }, { merge: true });
            alert("標準設定を保存しました");
        }

        // --- 管理者：日別編集 ---
        async function loadScheduleEdit() {
            const date = document.getElementById('edit-date-select').value;
            if(!date) return alert("日付を選択してください");
            const doc = await db.collection("schedules").doc(date).get();
            const body = document.getElementById('edit-table-body'); body.innerHTML = "";
            let data = doc.exists ? doc.data() : null;

            if (!data) { // 新規ならレギュラーを呼出
                const d = new Date(date);
                const dayKeys = ["sun", "mon", "tue", "wed", "thu", "fri", "sat"];
                const regDoc = await db.collection("config").doc("regular_schedule").get();
                const regData = regDoc.exists ? regDoc.data()[dayKeys[d.getDay()]] : null;
                data = { lessons: Array.from({length:6}, (_, i) => ({ sub: regData?.[i] || "国語", note: "" })), exitTime: "16:30" };
            }

            data.lessons.forEach((l, i) => {
                let opts = SUBJECT_LIST.map(s => `<option value="${s}" ${s===l.sub?'selected':''}>${s}</option>`).join('');
                body.innerHTML += `<tr><td>${i+1}</td><td><select id="edit-sub-${i}">${opts}</select></td><td><input type="text" id="edit-note-${i}" value="${l.note}"></td></tr>`;
            });
            document.getElementById('edit-exit-time').value = data.exitTime;
            document.getElementById('edit-form-wrapper').style.display = "block";
            
            // 未確認者リスト表示
            if(data.updatedAt) {
                const ut = data.updatedAt.toDate();
                const unread = Object.keys(studentMaster).filter(e => e !== TEACHER_EMAIL && (!studentMaster[e].lastLogin || studentMaster[e].lastLogin < ut));
                document.getElementById('unread-monitor').innerText = unread.length ? "更新後の未ログイン者：" + unread.map(e => studentMaster[e].name).join(", ") : "全員確認済み";
            } else { document.getElementById('unread-monitor').innerText = ""; }
        }

        document.getElementById('save-sch-btn').onclick = async () => {
            const date = document.getElementById('edit-date-select').value;
            const lessons = [];
            for(let i=0; i<6; i++) { lessons.push({ sub: document.getElementById(`edit-sub-${i}`).value, note: document.getElementById(`edit-note-${i}`).value }); }
            await db.collection("schedules").doc(date).set({ lessons, exitTime: document.getElementById('edit-exit-time').value, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
            alert("公開しました"); refreshDailyDisplay(); loadScheduleEdit();
        };

        // --- 名簿・ログ・ブログ基本機能 ---
        async function loadStudentList() {
            const snap = await db.collection("students").get();
            let html = "<table><tr><th>氏名</th><th>操作</th></tr>";
            snap.forEach(doc => { html += `<tr><td>${doc.data().name} (${doc.id})</td><td><button class="btn-small btn-red" onclick="deleteStudent('${doc.id}')">削除</button></td></tr>`; });
            document.getElementById('student-list-area').innerHTML = html + "</table>";
        }
        async function registerDirect() {
            const email = document.getElementById('direct-email').value, name = document.getElementById('direct-name').value;
            if(!email || !name) return;
            await db.collection("students").doc(email).set({ name }); loadStudentList();
        }
        async function deleteStudent(id) { if(confirm("削除？")) { await db.collection("students").doc(id).delete(); loadStudentList(); } }
        
        document.getElementById('post-blog-btn').onclick = () => {
            const content = document.getElementById('blog-input').value; if(!content) return;
            db.collection("blogs").add({ content, createdAt: firebase.firestore.FieldValue.serverTimestamp() }).then(() => { document.getElementById('blog-input').value = ""; alert("投稿完了"); });
        };

        function toggleLogs() {
            const area = document.getElementById('log-area');
            if(area.style.display === 'block') area.style.display = 'none';
            else { 
                area.style.display = 'block';
                db.collection("access_logs").orderBy("loginTime", "desc").limit(20).get().then(snap => {
                    const tbody = document.getElementById('log-table-body'); tbody.innerHTML = "";
                    snap.forEach(doc => { 
                        const name = studentMaster[doc.data().email]?.name || doc.data().email;
                        tbody.innerHTML += `<tr><td>${doc.data().loginTime?.toDate().toLocaleString()}</td><td>${name}</td></tr>`; 
                    });
                });
            }
        }

        document.getElementById('change-pw-btn').onclick = async () => {
            const user = firebase.auth().currentUser, oldPw = document.getElementById('old-password').value, newPw = document.getElementById('new-password').value;
            try {
                await user.reauthenticateWithCredential(firebase.auth.EmailAuthProvider.credential(user.email, oldPw));
                await user.updatePassword(newPw); alert("変更完了");
            } catch (e) { alert("失敗"); }
        };
        document.getElementById('logout-btn').onclick = () => location.reload();
        document.getElementById('reg-day-select').onchange = loadRegularSetting;
    </script>
</body>
</html>
