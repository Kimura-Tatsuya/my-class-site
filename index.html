<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Class Portal</title>
    <style>
        body { 
            background-color: white; color: black; 
            font-family: "MS UI Gothic", "MS Gothic", "Osaka", sans-serif; 
            line-height: 1.5; padding: 20px; max-width: 850px; margin: 0 auto; 
        }
        h1, h2, h3 { border-bottom: 1px solid black; margin-top: 25px; padding-bottom: 5px; }
        section { margin-bottom: 40px; border: 1px solid #000; padding: 20px; }
        input, textarea { width: 100%; max-width: 500px; padding: 8px; margin-bottom: 10px; border: 1px solid #000; box-sizing: border-box; font-family: inherit; }
        button { padding: 8px 15px; cursor: pointer; background: white; border: 1px solid black; font-weight: bold; margin-right: 5px; margin-bottom: 5px; }
        button:hover { background: #eeeeee; }
        
        .flex-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; align-items: center; }
        .post-item { border-bottom: 1px dashed #000; padding: 15px 0; }
        .post-date { font-size: 0.8em; color: #444; margin-bottom: 5px; }
        .edit-area { background: #f0f0f0; padding: 10px; border: 1px solid #000; margin-top: 10px; display: none; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        th, td { border: 1px solid black; padding: 8px; text-align: left; }
        th { background: #f2f2f2; }
        .btn-small { font-size: 0.8em; padding: 4px 8px; }
        .btn-red { color: red; border-color: red; }
        .admin-form-box { background: #f9f9f9; padding: 15px; border: 1px solid #000; margin-bottom: 20px; }
        #log-area { display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-section" style="text-align: center; margin-top: 50px;">
        <h1>My Class Portal</h1>
        <input type="email" id="login-email" placeholder="ID"><br>
        <input type="password" id="login-password" placeholder="PASSWORD"><br>
        <button id="login-btn">Login</button>
        <p id="error-message" style="color:red; font-weight:bold;"></p>
    </div>

    <div id="main-content" style="display: none;">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 id="welcome-msg" style="border:none; margin:0;">確認中...</h2>
            <button id="logout-btn">Logout</button>
        </header>

        <main>
            <section>
                <h2>今週の予定</h2>
                <div id="schedule-display"><p id="schedule-text" style="white-space: pre-wrap;"></p></div>
                <div id="schedule-edit" style="display: none;">
                    <textarea id="schedule-input"></textarea><br>
                    <button id="update-schedule-btn">予定を保存更新</button>
                </div>
            </section>

            <section>
                <h2>担任ブログ</h2>
                <div id="blog-admin-form" style="display: none;" class="admin-form-box">
                    <textarea id="blog-input" placeholder="投稿内容（文字のみ）"></textarea><br>
                    <button id="post-blog-btn">ブログを投稿する</button>
                </div>
                <div id="blog-list">取得中...</div>
            </section>

            <section id="admin-section" style="display: none; border: 3px double #000;">
                <h2 style="background:#000; color:#fff; padding:5px;">管理者専用メニュー</h2>
                
                <h3>名簿管理</h3>
                <div class="admin-form-box">
                    <div class="flex-row">
                        <input type="email" id="direct-email" placeholder="メールアドレス">
                        <input type="text" id="direct-name" placeholder="氏名">
                        <button id="direct-reg-btn">登録・更新</button>
                    </div>
                </div>
                <div id="student-list-area"></div>

                <h3>アクセスログ</h3>
                <button id="toggle-log-btn">ログ表示切替</button>
                <div id="log-area">
                    <table>
                        <thead><tr><th>日時</th><th>利用者</th></tr></thead>
                        <tbody id="log-table-body"></tbody>
                    </table>
                </div>
            </section>

            <section>
                <h2>設定（パスワード変更）</h2>
                <div style="max-width:400px;">
                    <p style="font-size:0.8em; margin-bottom:5px; color:red;">※手入力必須（コピペ禁止）</p>
                    <input type="password" id="old-password" placeholder="現在のパスワード" onpaste="return false;"><br>
                    <input type="password" id="new-password" placeholder="新しいパスワード（6文字以上）" onpaste="return false;"><br>
                    <input type="password" id="new-password-confirm" placeholder="確認用再入力" onpaste="return false;"><br>
                    <button id="change-pw-btn">パスワードを変更する</button>
                </div>
                <p id="pw-msg" style="font-weight:bold; margin-top:10px;"></p>
            </section>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC7R6Hbgt3C6iq_ozLM6FF6DBGA65j6dd0",
            authDomain: "my-class-site.firebaseapp.com",
            projectId: "my-class-site",
            storageBucket: "my-class-site.firebasestorage.app",
            messagingSenderId: "125594983188",
            appId: "1:125594983188:web:129aa54e9d3a39ca700001"
        };
        const TEACHER_EMAIL = "administrator@class.jp";

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let studentMaster = {};

        // ログイン
        document.getElementById('login-btn').onclick = () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            firebase.auth().signInWithEmailAndPassword(email, pass).then(res => initApp(res.user)).catch(() => { document.getElementById('error-message').innerText="認証失敗"; });
        };

        async function initApp(user) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';

            // 名前取得
            const userDoc = await db.collection("students").doc(user.email).get();
            document.getElementById('welcome-msg').innerText = (userDoc.exists ? userDoc.data().name : "ゲスト") + " さん、おかえりなさい";

            // 予定
            db.collection("config").doc("weekly_schedule").onSnapshot(doc => {
                if(doc.exists) document.getElementById('schedule-text').innerText = doc.data().text;
                if(user.email === TEACHER_EMAIL) document.getElementById('schedule-input').value = doc.data().text || "";
            });

            // ブログ
            db.collection("blogs").orderBy("createdAt", "desc").onSnapshot(snap => {
                const list = document.getElementById('blog-list');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const data = doc.data();
                    const id = doc.id;
                    const date = data.createdAt ? data.createdAt.toDate() : new Date();
                    const isoDate = new Date(date.getTime() - (date.getTimezoneOffset() * 60000)).toISOString().slice(0, 16);

                    let html = `<div class="post-item">
                        <div class="post-date">${date.toLocaleString('ja-JP')}</div>
                        <div>${data.content.replace(/\n/g, '<br>')}</div>`;

                    if (user.email === TEACHER_EMAIL) {
                        html += `
                        <div id="edit-area-${id}" class="edit-area">
                            <label>投稿日時：<input type="datetime-local" id="edit-date-${id}" value="${isoDate}"></label><br>
                            <textarea id="edit-input-${id}">${data.content}</textarea><br>
                            <button onclick="saveBlogEdit('${id}')">保存</button>
                            <button onclick="toggleEdit('${id}')">戻る</button>
                        </div>
                        <div class="flex-row" style="margin-top:10px;">
                            <button class="btn-small" onclick="toggleEdit('${id}')">編集</button>
                            <button class="btn-small btn-red" onclick="deleteBlog('${id}')">削除</button>
                        </div>`;
                    }
                    html += `</div>`;
                    list.innerHTML += html;
                });
            });

            // 管理者機能
            if (user.email === TEACHER_EMAIL) {
                document.getElementById('admin-section').style.display = 'block';
                document.getElementById('schedule-edit').style.display = 'block';
                document.getElementById('blog-admin-form').style.display = 'block';
                document.getElementById('toggle-log-btn').onclick = toggleLogs;
                document.getElementById('direct-reg-btn').onclick = registerDirect;
                loadStudentList();
                const sSnap = await db.collection("students").get();
                sSnap.forEach(d => { studentMaster[d.id] = d.data().name; });
            }

            db.collection("access_logs").add({ email: user.email, loginTime: firebase.firestore.FieldValue.serverTimestamp() });
        }

        // ブログ操作
        document.getElementById('post-blog-btn').onclick = async () => {
            const content = document.getElementById('blog-input').value;
            if (!content) return;
            await db.collection("blogs").add({ content, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            document.getElementById('blog-input').value = "";
        };

        function toggleEdit(id) {
            const el = document.getElementById(`edit-area-${id}`);
            el.style.display = (el.style.display === 'block') ? 'none' : 'block';
        }

        async function saveBlogEdit(id) {
            const content = document.getElementById(`edit-input-${id}`).value;
            const date = new Date(document.getElementById(`edit-date-${id}`).value);
            await db.collection("blogs").doc(id).update({ content, createdAt: firebase.firestore.Timestamp.fromDate(date) });
            alert("更新完了");
        }

        async function deleteBlog(id) {
            if (confirm("削除しますか？")) await db.collection("blogs").doc(id).delete();
        }

        // 名簿・ログ
        async function loadStudentList() {
            const snap = await db.collection("students").get();
            let html = "<table><tr><th>名前</th><th>メール</th><th>操作</th></tr>";
            snap.forEach(doc => {
                const email = doc.id, name = doc.data().name;
                const rId = `row-${email.replace(/[@.]/g, '-')}`;
                html += `<tr id="${rId}"><td>${name}</td><td>${email}</td><td>
                    <button class="btn-small" onclick="editStudentRow('${email}','${name}','${rId}')">編集</button>
                    <button class="btn-small btn-red" onclick="deleteStudent('${email}')">削除</button>
                </td></tr>`;
            });
            document.getElementById('student-list-area').innerHTML = html + "</table>";
        }

        function editStudentRow(email, name, rId) {
            document.getElementById(rId).innerHTML = `<td><input type="text" id="in-${rId}" value="${name}"></td><td>${email}</td>
            <td><button class="btn-small" onclick="saveStudentEdit('${email}','rId')">保存</button></td>`;
        }

        async function saveStudentEdit(email, rId) {
            const name = document.getElementById(`in-${rId}`).value;
            await db.collection("students").doc(email).update({ name });
            studentMaster[email] = name; loadStudentList();
        }

        async function registerDirect() {
            const email = document.getElementById('direct-email').value.trim();
            const name = document.getElementById('direct-name').value.trim();
            if(!email || !name) return;
            await db.collection("students").doc(email).set({ name });
            studentMaster[email] = name; loadStudentList();
        }

        async function deleteStudent(email) {
            if(confirm("削除？")) { await db.collection("students").doc(email).delete(); loadStudentList(); }
        }

        function toggleLogs() {
            const area = document.getElementById('log-area'), btn = document.getElementById('toggle-log-btn');
            if (area.style.display === 'block') { area.style.display = 'none'; btn.innerText = "ログを表示する"; }
            else { area.style.display = 'block'; btn.innerText = "ログを非表示にする"; loadLogs(); }
        }

        async function loadLogs() {
            const tbody = document.getElementById('log-table-body');
            tbody.innerHTML = "取得中...";
            const snap = await db.collection("access_logs").orderBy("loginTime", "desc").limit(30).get();
            tbody.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const time = d.loginTime ? d.loginTime.toDate().toLocaleString() : "---";
                const display = studentMaster[d.email] ? `${studentMaster[d.email]} (${d.email})` : d.email;
                tbody.innerHTML += `<tr><td>${time}</td><td>${display}</td></tr>`;
            });
        }

        // パスワード変更
        document.getElementById('change-pw-btn').onclick = async () => {
            const user = firebase.auth().currentUser, oldPw = document.getElementById('old-password').value,
                  newPw = document.getElementById('new-password').value, conf = document.getElementById('new-password-confirm').value;
            const msg = document.getElementById('pw-msg');
            if (newPw !== conf || newPw.length < 6) return alert("確認用の一致、または6文字以上必要です");
            try {
                await user.reauthenticateWithCredential(firebase.auth.EmailAuthProvider.credential(user.email, oldPw));
                await user.updatePassword(newPw);
                msg.style.color = "blue"; msg.innerText = "パスワードを正常に変更しました。";
                document.getElementById('old-password').value = ""; document.getElementById('new-password').value = ""; document.getElementById('new-password-confirm').value = "";
            } catch (e) { msg.style.color = "red"; msg.innerText = "変更に失敗しました。現在のパスワードを確認してください。"; }
        };

        document.getElementById('update-schedule-btn').onclick = () => {
            db.collection("config").doc("weekly_schedule").set({ text: document.getElementById('schedule-input').value });
            alert("保存しました");
        };

        document.getElementById('logout-btn').onclick = () => location.reload();
    </script>
</body>
</html>
