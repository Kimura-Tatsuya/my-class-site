<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>３年３組 学級のページ</title>
    <style>
        body { background-color: white; color: black; font-family: sans-serif; line-height: 1.6; padding: 20px; max-width: 800px; margin: 0 auto; }
        h1 { border-bottom: 2px solid black; padding-bottom: 10px; }
        section { margin-bottom: 30px; border: 1px solid #eee; padding: 15px; border-radius: 5px; }
        input { width: 100%; max-width: 300px; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; }
        button { padding: 10px 20px; cursor: pointer; background: #333; color: #fff; border: none; border-radius: 4px; }
        .error { color: red; font-size: 0.9em; }
    </style>
</head>
<body>

    <div id="login-section" style="text-align: center; margin-top: 50px;">
        <h1>Class Portal</h1>
        <p>ID（メール形式）とパスワードを入力してください。</p>
        <input type="email" id="email" placeholder="s01@class.jp"><br>
        <input type="password" id="password" placeholder="Password"><br>
        <button type="button" onclick="login()">Login</button>
        <p id="error-message" class="error"></p>
    </div>

    <div id="main-content" style="display: none;">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <h1>３年３組 学級のページ</h1>
            <button onclick="logout()" style="background:#f44336;">Logout</button>
        </header>
        <main>
            <section>
                <h2>📢 今週の予定</h2>
                <p>ログインに成功しました！ここに内容を記載します。</p>
            </section>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // --- 設定値 ---
        const firebaseConfig = {
            apiKey: "AIzaSyC7R6Hbgt3C6iq_ozLM6FF6DBGA65j6dd0",
            authDomain: "my-class-site.firebaseapp.com",
            projectId: "my-class-site",
            storageBucket: "my-class-site.firebasestorage.app",
            messagingSenderId: "125594983188",
            appId: "1:125594983188:web:129aa54e9d3a39ca700001",
            measurementId: "G-4EQ3Z9Q4NT"
        };

        // Firebaseの初期化
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ログイン関数（ここが定義されていないとエラーになります）
        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-message');

            console.log("Login attempt for:", email); // 動作確認用のログ

            firebase.auth().signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // ログを保存
                    db.collection("access_logs").add({
                        email: email,
                        loginTime: firebase.firestore.FieldValue.serverTimestamp(),
                        userAgent: navigator.userAgent
                    }).then(() => {
                        document.getElementById('login-section').style.display = 'none';
                        document.getElementById('main-content').style.display = 'block';
                    });
                })
                .catch((error) => {
                    console.error("Login Error:", error.code);
                    errorMsg.innerText = "IDまたはパスワードが違います。";
                });
        }

        function logout() {
            firebase.auth().signOut().then(() => {
                location.reload();
            });
        }
    </script>
</body>
</html>
