<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>３年３組 学級のページ</title>
    <style>
        body {
            background-color: white;
            color: black;
            font-family: sans-serif;
            line-height: 1.6;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 { border-bottom: 2px solid black; padding-bottom: 10px; }
        section { margin-bottom: 30px; border: 1px solid #eee; padding: 15px; border-radius: 5px; }
        input { width: 100%; max-width: 300px; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; }
        button { padding: 10px 20px; cursor: pointer; background: #333; color: #fff; border: none; border-radius: 4px; }
        button:hover { background: #555; }
        .error { color: red; font-size: 0.9em; }
        .logout-btn { background: #f44336; }
    </style>
</head>
<body>

    <div id="login-section" style="text-align: center; margin-top: 50px;">
        <h1>Class Portal</h1>
        <p>ID（メール形式）とパスワードを入力してください。</p>
        <input type="email" id="email" placeholder="例: s01@class.jp"><br>
        <input type="password" id="password" placeholder="Password"><br>
        <button onclick="login()">Login</button>
        <p id="error-message" class="error"></p>
    </div>

    <div id="main-content" style="display: none;">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <h1>３年３組 学級のページ</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </header>
        <main>
            <section>
                <h2>📢 今週の予定</h2>
                <p>ここはログインした生徒だけが閲覧できるページです。</p>
                <ul>
                    <li>月曜：宿題提出（漢字ドリル）</li>
                    <li>水曜：移動教室（理科室）</li>
                    <li>金曜：クラス会議</li>
                </ul>
            </section>
            
            <section style="background: #fdfdfd;">
                <h3>⚙️ アカウント設定</h3>
                <p>パスワードを変更したい場合は、以下のボタンを押してください。<br>
                登録済みのID宛に再設定用のメールが送信されます。</p>
                <button onclick="resetPassword()">パスワード再設定メールを送る</button>
            </section>
        </main>
    </div>
