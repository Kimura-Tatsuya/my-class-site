<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クラスのホームページ</title>
    <style>
        /* ここで見た目を整えます（白地に黒文字） */
        body {
            background-color: white;
            color: black;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            line-height: 1.6;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            border-bottom: 2px solid black;
            padding-bottom: 10px;
        }
        section {
            margin-bottom: 30px;
        }
    </style>

    <header>
        <h1>３年３組 学級だより</h1>
        <p>ここは私たちのクラスの公式ホームページです。</p>
    </header>

    <main>

<div id="login-form">
    <h2>クラス専用ページにログイン</h2>
    <input type="text" id="student-id" placeholder="出席番号など">
    <input type="password" id="password" placeholder="パスワード">
    <button onclick="login()">ログイン</button>
</div>

<div id="class-content" style="display:none;">
    <h2>〇年〇組の秘密の連絡事項</h2>
    <p>ここに、ログインした人だけが見れる情報を書きます。</p>
    <button onclick="changePassword()">パスワードを変更する</button>
</div>

        <section>
            <h2>今週の予定</h2>
            <ul>
                <li>月曜日：体育館履きを忘れないこと</li>
                <li>水曜日：単語テスト</li>
                <li>金曜日：校外学習（お弁当持参）</li>
            </ul>
        </section>

        <section>
            <h2>お知らせ</h2>
            <p>新しい掲示物を更新しました。教室の後ろを確認してください。</p>
        </section>
    </main>

    <footer>
        <hr>
        <p>&copy; 2026 ３年３組</p>
    </footer>
