<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クラスのホームページ</title>
    <style>
        /* ここで見た目を整えます（白地に黒文字） */
        body {
            background-color: white;
            color: black;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            line-height: 1.6;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            border-bottom: 2px solid black;
            padding-bottom: 10px;
        }
        section {
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <header>
        <h1>〇年〇組 クラスだより</h1>
        <p>ここは私たちのクラスの公式ホームページです。</p>
    </header>

    <main>
        <section>
            <h2>今週の予定</h2>
            <ul>
                <li>月曜日：体育館履きを忘れないこと</li>
                <li>水曜日：漢字テスト</li>
                <li>金曜日：校外学習（お弁当持参）</li>
            </ul>
        </section>

        <section>
            <h2>お知らせ</h2>
            <p>新しい掲示物を更新しました。教室の後ろを確認してください。</p>
        </section>
    </main>

    <footer>
        <hr>
        <p>&copy; 2026 〇年〇組</p>
    </footer>

</body>
</html>
