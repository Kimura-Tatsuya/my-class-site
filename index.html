<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>３年３組 学級管理システム</title>
    <style>
        body { background-color: white; color: black; font-family: "MS UI Gothic", "MS Gothic", "Osaka", sans-serif; line-height: 1.5; padding: 20px; max-width: 850px; margin: 0 auto; }
        h1, h2, h3 { font-weight: bold; border-bottom: 1px solid black; margin-top: 25px; padding-bottom: 5px; }
        section { margin-bottom: 40px; border: 1px solid #000; padding: 20px; }
        input, textarea, select { width: 100%; max-width: 500px; padding: 8px; margin-bottom: 10px; border: 1px solid #000; box-sizing: border-box; font-family: inherit; }
        button { padding: 8px 15px; cursor: pointer; background: white; color: black; border: 1px solid black; font-weight: bold; font-family: inherit; margin-right: 5px; margin-bottom: 5px; }
        button:hover { background: #eeeeee; }
        
        .flex-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; align-items: center; }
        .day-container { display: flex; gap: 20px; margin-top: 10px; }
        .day-box { flex: 1; border: 1px solid #000; padding: 10px; min-width: 280px; }
        
        .post-item { border-bottom: 1px dashed #000; padding: 15px 0; }
        .post-date { font-size: 0.8em; color: #444; margin-bottom: 5px; }
        .edit-area { background: #f0f0f0; padding: 10px; border: 1px solid #000; margin-top: 10px; display: none; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        th, td { border: 1px solid black; padding: 8px; text-align: center; }
        th { background: #f2f2f2; }
        .text-left { text-align: left; }

        .btn-small { font-size: 0.8em; padding: 4px 8px; }
        .btn-red { color: red; border-color: red; }
        .btn-blue { color: blue; border-color: blue; }
        .admin-form-box { background: #f9f9f9; padding: 15px; border: 1px solid #000; margin-bottom: 20px; }
        .unread-msg { color: red; font-weight: bold; font-size: 0.8em; margin-top: 10px; }
        #log-area { display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-section" style="text-align: center; margin-top: 50px;">
        <h1>学級管理システム ログイン</h1>
        <input type="email" id="login-email" placeholder="メールアドレス"><br>
        <input type="password" id="login-password" placeholder="パスワード"><br>
        <button type="button" id="login-btn">ログイン</button>
        <p id="error-message" style="color:red; font-weight:bold;"></p>
    </div>

    <div id="main-content" style="display: none;">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 id="welcome-msg" style="border:none; margin:0;">確認中...</h2>
            <button id="logout-btn">ログアウト</button>
        </header>

        <main>
            <section>
                <h2>本日の予定・明日の予定</h2>
                <div class="day-container">
                    <div id="today-area" class="day-box">取得中...</div>
                    <div id="tomorrow-area" class="day-box">取得中...</div>
                </div>
            </section>

            <section id="schedule-admin-section" style="display: none;">
                <h2 style="color: blue;">予定編集（5週間先まで）</h2>
                <div class="admin-form-box">
                    日付選択：<input type="date" id="edit-date-select" style="max-width:200px;">
                    <button onclick="loadScheduleEdit()">編集データ呼出</button>
                    <div id="edit-form-wrapper" style="display:none; margin-top:15px;">
                        <table>
                            <tr><th>校時</th><th>科目</th><th>備考（特別な連絡がない場合は「いつも通り」）</th></tr>
                            <tbody id="edit-table-body"></tbody>
                        </table>
                        <div style="margin-top:10px;">
                            最終下校時刻：<input type="time" id="edit-exit-time" style="max-width:120px;">
                            <button id="save-sch-btn" style="background:#e1f5fe;">保存・更新</button>
                        </div>
                        <div id="unread-monitor" class="unread-msg"></div>
                    </div>
                </div>
            </section>

            <section>
                <h2>担任ブログ</h2>
                <div id="blog-admin-form" style="display: none;" class="admin-form-box">
                    <textarea id="blog-input" placeholder="投稿内容を入力してください"></textarea><br>
                    <button id="post-blog-btn">ブログを投稿する</button>
                </div>
                <div id="blog-list">取得中...</div>
            </section>

            <section id="admin-section" style="display: none; border: 3px double #000;">
                <h2 style="background: #000; color: #fff; padding: 5px;">管理者専用メニュー（名簿・ログ）</h2>
                <div class="admin-form-box">
                    <div class="flex-row">
                        <input type="email" id="direct-email" placeholder="メールアドレス" style="max-width:250px;">
                        <input type="text" id="direct-name" placeholder="氏名" style="max-width:150px;">
                        <button id="direct-reg-btn">登録・更新</button>
                    </div>
                    <hr>
                    <input type="file" id="csv-file" accept=".csv" style="display:block;">
                    <div class="flex-row">
                        <button id="import-csv-btn">名簿インポート(CSV)</button>
                        <button id="export-student-btn">名簿エクスポート(CSV)</button>
                    </div>
                </div>
                <h3>登録状況一覧</h3>
                <div id="student-list-area"></div>
                <h3>アクセスログ</h3>
                <button id="toggle-log-btn">ログを表示する</button>
                <div id="log-area">
                    <table>
                        <thead><tr><th>日時</th><th>利用者（氏名・メール）</th></tr></thead>
                        <tbody id="log-table-body"></tbody>
                    </table>
                </div>
            </section>

            <section>
                <h2>設定（パスワード変更）</h2>
                <div style="max-width:400px;">
                    <p style="font-size:0.8em; margin-bottom:5px;">※コピー＆ペースト禁止</p>
                    <input type="password" id="old-password" placeholder="現在のパスワード" onpaste="return false;"><br>
                    <input type="password" id="new-password" placeholder="新しいパスワード（6文字以上）" onpaste="return false;"><br>
                    <input type="password" id="new-password-confirm" placeholder="新しいパスワード（確認用再入力）" onpaste="return false;"><br>
                    <button id="change-pw-btn">パスワードを変更・確定する</button>
                </div>
                <p id="pw-msg" style="font-size:0.9em; margin-top:10px; font-weight:bold;"></p>
            </section>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC7R6Hbgt3C6iq_ozLM6FF6DBGA65j6dd0",
            authDomain: "my-class-site.firebaseapp.com",
            projectId: "my-class-site",
            storageBucket: "my-class-site.firebasestorage.app",
            messagingSenderId: "125594983188",
            appId: "1:125594983188:web:129aa54e9d3a39ca700001"
        };
        const TEACHER_EMAIL = "administrator@class.jp";
        const SUBJECT_LIST = ["国語", "社会", "数学", "理科", "英語", "音楽", "美術", "保体", "技家", "学活", "総合", "道徳", "行事"];

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let studentMaster = {}; // { email: { name, lastLogin } }

        document.getElementById('login-btn').onclick = () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            firebase.auth().signInWithEmailAndPassword(email, pass).then(res => initApp(res.user)).catch(err => { document.getElementById('error-message').innerText = "ログイン失敗"; });
        };

        async function initApp(user) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';

            // 名簿とログイン時刻の同期
            const studentSnap = await db.collection("students").get();
            studentSnap.forEach(doc => { 
                studentMaster[doc.id] = { name: doc.data().name, lastLogin: doc.data().lastLogin ? doc.data().lastLogin.toDate() : null }; 
            });

            const myInfo = studentMaster[user.email];
            document.getElementById('welcome-msg').innerText = (myInfo ? myInfo.name : "未登録") + " さん、おかえりなさい";

            // 自身のログイン時刻を更新
            await db.collection("students").doc(user.email).update({ lastLogin: firebase.firestore.FieldValue.serverTimestamp() });

            // 今日・明日の表示
            refreshDailyDisplay();

            // ブログ読み込み
            db.collection("blogs").orderBy("createdAt", "desc").limit(20).onSnapshot(snap => {
                const list = document.getElementById('blog-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    const id = d.id;
                    const date = data.createdAt ? data.createdAt.toDate().toLocaleString('ja-JP') : "日時不明";
                    let html = `<div class="post-item"><div class="post-date">${date}</div><div>${data.content.replace(/\n/g, '<br>')}</div>`;
                    if (user.email === TEACHER_EMAIL) {
                        html += `<div id="edit-area-${id}" class="edit-area"><textarea id="edit-input-${id}" style="width:100%">${data.content}</textarea><button class="btn-small" onclick="saveBlogEdit('${id}')">更新</button><button class="btn-small" onclick="toggleEdit('${id}')">戻る</button></div>
                        <div class="flex-row" style="margin-top:10px;"><button class="btn-small" onclick="toggleEdit('${id}')">編集</button><button class="btn-small btn-red" onclick="deleteBlog('${id}')">削除</button></div>`;
                    }
                    html += `</div>`;
                    list.innerHTML += html;
                });
            });

            if (user.email === TEACHER_EMAIL) {
                document.getElementById('admin-section').style.display = 'block';
                document.getElementById('schedule-admin-section').style.display = 'block';
                document.getElementById('blog-admin-form').style.display = 'block';
                document.getElementById('toggle-log-btn').onclick = toggleLogs;
                document.getElementById('direct-reg-btn').onclick = registerDirect;
                document.getElementById('save-sch-btn').onclick = saveSchedule;
                loadStudentList();
            }

            db.collection("access_logs").add({ email: user.email, loginTime: firebase.firestore.FieldValue.serverTimestamp() });
        }

        // --- スケジュール機能 ---

        function getISODate(offset = 0) {
            const d = new Date();
            d.setDate(d.getDate() + offset);
            return d.toISOString().split('T')[0];
        }

        async function refreshDailyDisplay() {
            renderDayCard(getISODate(0), "today-area", "【今日】");
            renderDayCard(getISODate(1), "tomorrow-area", "【明日】");
        }

        async function renderDayCard(dateStr, elId, label) {
            const doc = await db.collection("schedules").doc(dateStr).get();
            const el = document.getElementById(elId);
            if (!doc.exists) {
                el.innerHTML = `<strong>${label} ${dateStr}</strong><p>予定が登録されていません</p>`;
                return;
            }
            const data = doc.data();
            let table = `<strong>${label} ${dateStr}</strong><table><tr><th>校時</th><th>科目</th><th>備考</th></tr>`;
            data.lessons.forEach((l, i) => {
                table += `<tr><td>${i+1}</td><td>${l.sub}</td><td class="text-left">${l.note || "いつも通り"}</td></tr>`;
            });
            table += `</table><p style="text-align:right; margin-top:5px;">最終下校：${data.exitTime || "---"}</p>`;
            el.innerHTML = table;
        }

        async function loadScheduleEdit() {
            const dateStr = document.getElementById('edit-date-select').value;
            if(!dateStr) return alert("日付を選択してください");
            
            const doc = await db.collection("schedules").doc(dateStr).get();
            const body = document.getElementById('edit-table-body');
            body.innerHTML = "";
            const data = doc.exists ? doc.data() : null;

            for (let i = 0; i < 6; i++) {
                const curSub = data ? data.lessons[i].sub : "国語";
                const curNote = data ? data.lessons[i].note : "";
                let options = SUBJECT_LIST.map(s => `<option value="${s}" ${s === curSub ? 'selected' : ''}>${s}</option>`).join('');
                body.innerHTML += `<tr><td>${i+1}</td><td><select id="edit-sub-${i}" style="margin-bottom:0;">${options}</select></td>
                                   <td><input type="text" id="edit-note-${i}" value="${curNote}" placeholder="いつも通り" style="margin-bottom:0;"></td></tr>`;
            }
            document.getElementById('edit-exit-time').value = data ? data.exitTime : "16:30";
            document.getElementById('edit-form-wrapper').style.display = "block";

            // 未確認者リスト（更新後にログインがない生徒）
            if (data && data.updatedAt) {
                const updateTime = data.updatedAt.toDate();
                const unread = Object.keys(studentMaster).filter(email => {
                    if (email === TEACHER_EMAIL) return false;
                    const lastLogin = studentMaster[email].lastLogin;
                    return !lastLogin || lastLogin < updateTime;
                });
                document.getElementById('unread-monitor').innerText = unread.length > 0 ? 
                    "更新後の未確認者：" + unread.map(e => studentMaster[e].name).join(", ") : "全員確認済みです";
            } else {
                document.getElementById('unread-monitor').innerText = "";
            }
        }

        async function saveSchedule() {
            const dateStr = document.getElementById('edit-date-select').value;
            const lessons = [];
            for (let i = 0; i < 6; i++) {
                lessons.push({
                    sub: document.getElementById(`edit-sub-${i}`).value,
                    note: document.getElementById(`edit-note-${i}`).value
                });
            }
            const exitTime = document.getElementById('edit-exit-time').value;
            await db.collection("schedules").doc(dateStr).set({
                lessons, exitTime, updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("保存しました");
            refreshDailyDisplay();
            loadScheduleEdit();
        }

        // --- 以下、既存機能の維持 ---

        async function loadStudentList() {
            const snap = await db.collection("students").get();
            let html = "<table><tr><th>名前</th><th>メール</th><th>操作</th></tr>";
            snap.forEach(doc => {
                const email = doc.id, name = doc.data().name;
                html += `<tr id="row-${email.replace(/[@.]/g, '-')}"><td class="name-cell">${name}</td><td>${email}</td>
                    <td><button class="btn-small btn-blue" onclick="editStudentRow('${email}', '${name}')">編集</button>
                    <button class="btn-small btn-red" onclick="deleteStudent('${email}')">削除</button></td></tr>`;
            });
            document.getElementById('student-list-area').innerHTML = html + "</table>";
        }
        function editStudentRow(email, currentName) {
            const rowId = `row-${email.replace(/[@.]/g, '-')}`, row = document.getElementById(rowId);
            row.innerHTML = `<td><input type="text" id="edit-name-${rowId}" value="${currentName}" style="margin-bottom:0; width:120px;"></td><td>${email}</td>
                <td><button class="btn-small" onclick="saveStudentEdit('${email}', '${rowId}')">保存</button><button class="btn-small" onclick="loadStudentList()">取消</button></td>`;
        }
        async function saveStudentEdit(email, rowId) {
            const newName = document.getElementById(`edit-name-${rowId}`).value.trim();
            if(!newName) return alert("入力してください");
            await db.collection("students").doc(email).update({ name: newName });
            studentMaster[email].name = newName; loadStudentList();
        }
        async function deleteStudent(email) {
            if(confirm("削除しますか？")) { await db.collection("students").doc(email).delete(); delete studentMaster[email]; loadStudentList(); }
        }
        function toggleLogs() {
            const area = document.getElementById('log-area'), btn = document.getElementById('toggle-log-btn');
            if (area.style.display === 'block') { area.style.display = 'none'; btn.innerText = "ログを表示する"; }
            else { area.style.display = 'block'; btn.innerText = "ログを非表示にする"; loadLogs(); }
        }
        async function loadLogs() {
            const tbody = document.getElementById('log-table-body'); tbody.innerHTML = "取得中...";
            const snap = await db.collection("access_logs").orderBy("loginTime", "desc").limit(30).get();
            tbody.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data(), time = d.loginTime ? d.loginTime.toDate().toLocaleString() : "---";
                const displayName = studentMaster[d.email] ? `${studentMaster[d.email].name} (${d.email})` : d.email;
                tbody.innerHTML += `<tr><td>${time}</td><td>${displayName}</td></tr>`;
            });
        }
        document.getElementById('change-pw-btn').onclick = async () => {
            const user = firebase.auth().currentUser, oldPw = document.getElementById('old-password').value,
                  newPw = document.getElementById('new-password').value, confirmPw = document.getElementById('new-password-confirm').value, msg = document.getElementById('pw-msg');
            if(!oldPw || !newPw || !confirmPw) return alert("全項目入力してください");
            if(newPw !== confirmPw) return alert("不一致");
            try {
                await user.reauthenticateWithCredential(firebase.auth.EmailAuthProvider.credential(user.email, oldPw));
                await user.updatePassword(newPw);
                msg.style.color = "blue"; msg.innerText = "完了";
                document.getElementById('old-password').value = ""; document.getElementById('new-password').value = ""; document.getElementById('new-password-confirm').value = "";
            } catch (err) { msg.style.color = "red"; msg.innerText = "失敗"; }
        };
        async function registerDirect() {
            const email = document.getElementById('direct-email').value.trim(), name = document.getElementById('direct-name').value.trim();
            if(!email || !name) return alert("入力してください");
            await db.collection("students").doc(email).set({ name: name });
            studentMaster[email] = { name: name, lastLogin: null }; loadStudentList();
        }
        function toggleEdit(id) { const area = document.getElementById(`edit-area-${id}`); area.style.display = (area.style.display === 'block') ? 'none' : 'block'; }
        async function saveBlogEdit(id) {
            const newContent = document.getElementById(`edit-input-${id}`).value;
            await db.collection("blogs").doc(id).update({ content: newContent }); alert("更新完了");
        }
        async function deleteBlog(id) { if(confirm("削除？")) await db.collection("blogs").doc(id).delete(); }
        document.getElementById('export-student-btn').onclick = async () => {
            const snap = await db.collection("students").get();
            let csv = "メールアドレス,名前\n"; snap.forEach(doc => { csv += `${doc.id},${doc.data().name}\n`; });
            const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: "text/csv" });
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "student_list.csv"; a.click();
        };
        document.getElementById('import-csv-btn').onclick = () => {
            const file = document.getElementById('csv-file').files[0]; if(!file) return alert("選択してください");
            const reader = new FileReader();
            reader.onload = async (e) => {
                const rows = e.target.result.split("\n");
                for(let row of rows) {
                    const cols = row.split(",");
                    if(cols.length >= 2 && cols[0].includes("@")) await db.collection("students").doc(cols[0].trim()).set({ name: cols[1].trim() });
                }
                alert("完了"); loadStudentList();
            };
            reader.readAsText(file);
        };
        document.getElementById('post-blog-btn').onclick = () => {
            const content = document.getElementById('blog-input').value; if(!content) return;
            db.collection("blogs").add({ content: content, createdAt: firebase.firestore.FieldValue.serverTimestamp() })
              .then(() => { document.getElementById('blog-input').value = ""; alert("投稿完了"); });
        };
        document.getElementById('logout-btn').onclick = () => { location.reload(); };
    </script>
</body>
</html>
