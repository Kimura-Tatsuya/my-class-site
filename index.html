<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学級管理システム</title>
    <style>
        body { background-color: white; color: black; font-family: sans-serif; line-height: 1.6; padding: 20px; max-width: 800px; margin: 0 auto; }
        h1, h2, h3 { border-bottom: 1px solid black; padding-bottom: 5px; }
        section { margin-bottom: 40px; border: 1px solid #ccc; padding: 15px; border-radius: 4px; }
        input, textarea { width: 100%; max-width: 500px; padding: 10px; margin-bottom: 10px; border: 1px solid #999; box-sizing: border-box; }
        textarea { height: 120px; }
        button { padding: 10px 20px; cursor: pointer; background: white; color: black; border: 1px solid black; font-weight: bold; margin-right: 5px; }
        button:hover { background: #eee; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        .post-item { border-bottom: 1px dashed #ccc; padding: 15px 0; }
        .post-date { font-size: 0.8em; color: #666; margin-bottom: 5px; }
        .pagination { margin-top: 20px; display: flex; gap: 10px; justify-content: center; }
        .info-text { font-size: 0.8em; color: #555; }
    </style>
</head>
<body>

    <div id="login-section" style="text-align: center; margin-top: 50px;">
        <h1>Class Portal</h1>
        <input type="email" id="email" placeholder="メールアドレス"><br>
        <input type="password" id="password" placeholder="パスワード"><br>
        <button onclick="login()">ログイン</button>
        <p id="error-message" style="color:red;"></p>
    </div>

    <div id="main-content" style="display: none;">
        <header style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid black; margin-bottom: 20px;">
            <h2 id="welcome-msg">読み込み中...</h2>
            <button onclick="logout()" style="border: 1px solid red; color: red;">ログアウト</button>
        </header>

        <main>
            <section id="schedule-section">
                <h2>📢 今週の予定</h2>
                <div id="schedule-display"><p id="schedule-text" style="white-space: pre-wrap; font-size: 1.1em;"></p></div>
                <div id="schedule-edit" style="display: none;">
                    <textarea id="schedule-input"></textarea><br>
                    <button onclick="updateSchedule()">予定を更新保存</button>
                </div>
                <p id="last-updated" style="font-size: 0.75em; color: #666; margin-top: 10px;"></p>
            </section>

            <section id="blog-section">
                <h2>📝 担任ブログ</h2>
                
                <div id="blog-admin-form" style="display: none; background: #f9f9f9; padding: 15px; border: 1px solid #000; margin-bottom: 20px;">
                    <h3>新規投稿</h3>
                    <textarea id="blog-input" placeholder="ブログ本文を入力..."></textarea><br>
                    <label class="info-text">日時指定（空欄で現在時刻投稿）:</label><br>
                    <input type="datetime-local" id="blog-datetime" style="max-width: 250px;"><br>
                    <button onclick="postBlog()">ブログを投稿する</button>
                </div>

                <div id="blog-list">投稿を取得しています...</div>
                
                <div class="pagination">
                    <button id="blog-prev" onclick="fetchBlogs('prev')" style="display:none;">前の20件</button>
                    <button id="blog-next" onclick="fetchBlogs('next')" style="display:none;">次の20件</button>
                </div>
            </section>

            <section>
                <h3>🔑 パスワード変更</h3>
                <input type="password" id="new-password" placeholder="新しいパスワード(6文字以上)" style="max-width:250px;">
                <button onclick="changePassword()">パスワード更新</button>
            </section>

            <section id="admin-section" style="display: none; border: 2px solid red;">
                <h2 style="color: red;">🛠️ 管理者メニュー</h2>
                
                <div>
                    <h3>👥 名簿管理 (CSV)</h3>
                    <p class="info-text">CSV形式: メールアドレス,氏名,クラス,番号</p>
                    <input type="file" id="csv-file" accept=".csv"><br>
                    <button onclick="importCSV()">CSVから名簿インポート</button>
                    <button onclick="exportCSV()">現在の名簿を出力</button>
                    <p id="import-status" style="font-weight:bold; color:blue;"></p>
                </div>

                <div style="margin-top: 20px;">
                    <h3>📊 最近のアクセスログ</h3>
                    <div id="log-list"></div>
                    <button onclick="downloadLogCSV()" style="margin-top: 10px;">全ログをCSV保存</button>
                </div>
            </section>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // --- 設定エリア ---
        const firebaseConfig = {
            apiKey: "AIzaSyC7R6Hbgt3C6iq_ozLM6FF6DBGA65j6dd0",
            authDomain: "my-class-site.firebaseapp.com",
            projectId: "my-class-site",
            storageBucket: "my-class-site.firebasestorage.app",
            messagingSenderId: "125594983188",
            appId: "1:125594983188:web:129aa54e9d3a39ca700001"
        };
        const TEACHER_EMAIL = "teacher@example.com"; // 先生のアドレス

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let studentMaster = {};
        let blogCursorFirst = null;
        let blogCursorLast = null;

        // ログイン
        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            firebase.auth().signInWithEmailAndPassword(email, password)
                .then(res => initApp(res.user))
                .catch(err => document.getElementById('error-message').innerText = "ログインに失敗しました。");
        }

        async function initApp(user) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';

            // 名簿取得
            const snap = await db.collection("students").get();
            snap.forEach(doc => { studentMaster[doc.id] = doc.data(); });

            // 氏名表示
            const name = studentMaster[user.email] ? studentMaster[user.email].name : "ゲスト";
            document.getElementById('welcome-msg').innerText = `${name} さん、おかえりなさい！`;

            fetchSchedule();
            fetchBlogs();

            if (user.email === TEACHER_EMAIL) {
                document.getElementById('admin-section').style.display = 'block';
                document.getElementById('schedule-edit').style.display = 'block';
                document.getElementById('schedule-display').style.display = 'none';
                document.getElementById('blog-admin-form').style.display = 'block';
