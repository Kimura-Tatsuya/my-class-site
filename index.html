<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>学級ポータル</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        section { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; }
        input, textarea { width: 100%; margin-bottom: 10px; padding: 5px; }
        button { padding: 10px; cursor: pointer; background: #333; color: #fff; border: none; }
        .post { border-bottom: 1px solid #eee; padding: 10px 0; }
    </style>
</head>
<body>

    <div id="login-area">
        <h1>ログイン</h1>
        <input type="email" id="email" placeholder="メールアドレス">
        <input type="password" id="pw" placeholder="パスワード">
        <button id="login-btn">ログイン</button>
    </div>

    <div id="main-area" style="display:none;">
        <h2 id="user-name">こんにちは</h2>
        <button onclick="location.reload()">ログアウト</button>

        <section>
            <h3>📢 今週の予定</h3>
            <div id="sch-view" style="white-space: pre-wrap; background: #f9f9f9; padding: 10px;"></div>
            <div id="sch-edit" style="display:none;">
                <textarea id="sch-input"></textarea>
                <button id="sch-btn">予定を保存</button>
            </div>
        </section>

        <section>
            <h3>📝 担任ブログ</h3>
            <div id="blog-edit" style="display:none;">
                <textarea id="blog-input" placeholder="ブログを書く"></textarea>
                <button id="blog-btn">投稿</button>
            </div>
            <div id="blog-list">読み込み中...</div>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // ★ここをご自身のものに書き換えてください
        const firebaseConfig = {
            apiKey: "AIzaSyC7R6Hbgt3C6iq_ozLM6FF6DBGA65j6dd0",
            authDomain: "my-class-site.firebaseapp.com",
            projectId: "my-class-site",
            storageBucket: "my-class-site.firebasestorage.app",
            messagingSenderId: "125594983188",
            appId: "1:125594983188:web:129aa54e9d3a39ca700001"
        };
        const TEACHER = "teacher@example.com"; 

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ログインボタン
        document.getElementById('login-btn').onclick = () => {
            const mail = document.getElementById('email').value;
            const pass = document.getElementById('pw').value;
            firebase.auth().signInWithEmailAndPassword(mail, pass)
                .then(res => setup(res.user))
                .catch(e => alert("ログイン失敗: " + e.message));
        };

        async function setup(user) {
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('main-area').style.display = 'block';

            // 名簿から名前を取得
            db.collection("students").doc(user.email).get().then(doc => {
                if(doc.exists) document.getElementById('user-name').innerText = doc.data().name + " さん、こんにちは";
            });

            // 予定の表示
            db.collection("config").doc("weekly").onSnapshot(doc => {
                if(doc.exists) {
                    document.getElementById('sch-view').innerText = doc.data().text;
                    document.getElementById('sch-input').value = doc.data().text;
                }
            });

            // ブログの表示
            db.collection("blogs").orderBy("at", "desc").limit(10).onSnapshot(snap => {
                const out = document.getElementById('blog-list');
                out.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    out.innerHTML += `<div class="post"><small>${data.at?.toDate().toLocaleString() || ""}</small><div>${data.txt}</div></div>`;
                });
                if(snap.empty) out.innerHTML = "まだ投稿がありません。";
            });

            // 先生なら編集機能を出すす
            if(user.email === TEACHER) {
                document.getElementById('sch-edit').style.display = 'block';
                document.getElementById('blog-edit').style.display = 'block';
            }
        }

        // 予定保存
        document.getElementById('sch-btn').onclick = () => {
            db.collection("config").doc("weekly").set({
                text: document.getElementById('sch-input').value,
                at: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => alert("保存しました"));
        };

        // ブログ投稿
        document.getElementById('blog-btn').onclick = () => {
            const txt = document.getElementById('blog-input').value;
            if(!txt) return;
            db.collection("blogs").add({
                txt: txt,
                at: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                document.getElementById('blog-input').value = "";
            });
        };
    </script>
</body>
</html>
