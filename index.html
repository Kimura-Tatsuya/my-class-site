<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>３年３組 学級のページ</title>
    <style>
        body { background-color: white; color: black; font-family: sans-serif; line-height: 1.6; padding: 20px; max-width: 900px; margin: 0 auto; }
        h1 { border-bottom: 2px solid black; padding-bottom: 10px; }
        section { margin-bottom: 30px; border: 1px solid #eee; padding: 15px; border-radius: 5px; }
        input { width: 100%; max-width: 300px; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; cursor: pointer; background: #333; color: #fff; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background: #555; }
        .error { color: red; font-size: 0.9em; min-height: 1.5em; }
        
        /* 管理者用ログテーブルのスタイル */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85em; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #eee; }
        #admin-log-section { background: #fffdf9; border: 2px solid #f44336; }
        .pagination { margin-top: 20px; text-align: center; display: flex; justify-content: center; gap: 10px; }
        .btn-page { background: #eee; color: #333; padding: 5px 15px; }
        .btn-csv { background: #4CAF50 !important; }
    </style>
</head>
<body>

    <div id="login-section" style="text-align: center; margin-top: 50px;">
        <h1>Class Portal</h1>
        <p>メールアドレスとパスワードを入力してください。</p>
        <input type="email" id="email" placeholder="s01@class.jp"><br>
        <input type="password" id="password" placeholder="Password"><br>
        <button type="button" onclick="login()">Login</button>
        <p id="error-message" class="error"></p>
    </div>

    <div id="main-content" style="display: none;">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1>３年３組 学級のページ</h1>
            <button onclick="logout()" style="background:#f44336;">Logout</button>
        </header>

        <main>
            <section>
                <h2>📢 今週の予定</h2>
                <p>月曜：移動教室あり（理科室）</p>
                <p>火曜：漢字小テスト</p>
                <p>金曜：学級会</p>
            </section>

            <section id="admin-log-section" style="display: none;">
                <h2>📊 【管理者用】アクセスログ</h2>
                <table>
                    <thead>
                        <tr>
                            <th>日時</th>
                            <th>氏名</th>
                            <th>メールアドレス</th>
                        </tr>
                    </thead>
                    <tbody id="log-table-body">
                        <tr><td colspan="3" style="text-align:center;">読み込み中...</td></tr>
                    </tbody>
                </table>
                <div class="pagination">
                    <button class="btn-page" onclick="prevPage()">前の20件</button>
                    <button class="btn-page" onclick="nextPage()">次の20件</button>
                    <button class="btn-csv" onclick="downloadCSV()">CSV保存</button>
                </div>
            </section>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // --- ① 名簿データ（エクセルからコピーしたものをここに貼り付け） ---
        const studentList = {
            "teacher@example.com": "管理者（先生）",
            "s01@class.jp": "阿部 太郎",
            "s02@class.jp": "伊藤 花子",
            "s03@class.jp": "上野 健太"
            // ここにエクセルの数式で生成したデータを追加
        };

        // --- ② Firebase 設定 ---
        const firebaseConfig = {
            apiKey: "AIzaSyC7R6Hbgt3C6iq_ozLM6FF6DBGA65j6dd0",
            authDomain: "my-class-site.firebaseapp.com",
            projectId: "my-class-site",
            storageBucket: "my-class-site.firebasestorage.app",
            messagingSenderId: "125594983188",
            appId: "1:125594983188:web:129aa54e9d3a39ca700001"
        };

        const TEACHER_EMAIL = "teacher@example.com"; // ★管理者アドレス

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let lastVisible = null; 
        let firstVisible = null;

        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-message');
            errorMsg.innerText = "認証中...";

            firebase.auth().signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('main-content').style.display = 'block';

                    if (user.email === TEACHER_EMAIL) {
                        document.getElementById('admin-log-section').style.display = 'block';
                        loadLogs();
                    }

                    // ログ記録（サーバー時間を使用）
                    db.collection("access_logs").add({
                        email: user.email,
                        loginTime: firebase.firestore.FieldValue.serverTimestamp()
                    });
                })
                .catch((error) => {
                    errorMsg.innerText = "IDまたはパスワードが違います。";
                });
        }

        function loadLogs(direction = null) {
            const tbody = document.getElementById('log-table-body');
            let query = db.collection("access_logs").orderBy("loginTime", "desc");

            if (direction === "next" && lastVisible) {
                query = query.startAfter(lastVisible).limit(20);
            } else if (direction === "prev" && firstVisible) {
                query = query.endBefore(firstVisible).limitToLast(20);
            } else {
                query = query.limit(20);
            }

            query.get().then(snap => {
                if (snap.empty) return;
                tbody.innerHTML = "";
                firstVisible = snap.docs[0];
                lastVisible = snap.docs[snap.docs.length - 1];

                snap.forEach(doc => {
                    const d = doc.data();
                    const name = studentList[d.email] || "未登録ユーザー";
                    const date = d.loginTime ? d.loginTime.toDate().toLocaleString('ja-JP') : "記録中...";
                    tbody.innerHTML += `<tr><td>${date}</td><td><strong>${name}</strong></td><td>${d.email}</td></tr>`;
                });
            }).catch(err => {
                console.error(err);
                tbody.innerHTML = `<tr><td colspan="3" style="color:red;">権限エラーまたはインデックス未作成です</td></tr>`;
            });
        }

        function nextPage() { loadLogs("next"); }
        function prevPage() { loadLogs("prev"); }

        function downloadCSV() {
            db.collection("access_logs").orderBy("loginTime", "desc").get().then(snap => {
                let csv = "\uFEFF日時,氏名,メールアドレス\n"; // UTF-8(BOM付き)でエクセル文字化け防止
                snap.forEach(doc => {
                    const d = doc.data();
                    const name = studentList[d.email] || "未登録";
                    const date = d.loginTime ? d.loginTime.toDate().toLocaleString('ja-JP') : "";
                    csv += `"${date}","${name}","${d.email}"\n`;
                });
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = "学級ログ_" + new Date().toLocaleDateString() + ".csv";
                link.click();
            });
        }

        function logout() {
            firebase.auth().signOut().then(() => { location.reload(); });
        }
    </script>
</body>
</html>
