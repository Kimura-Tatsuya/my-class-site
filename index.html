<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学級管理システム</title>
    <style>
        body { background-color: white; color: black; font-family: sans-serif; line-height: 1.6; padding: 20px; max-width: 800px; margin: 0 auto; }
        h1, h2, h3 { border-bottom: 1px solid black; padding-bottom: 5px; }
        section { margin-bottom: 40px; border: 1px solid #ccc; padding: 15px; border-radius: 4px; }
        input, textarea { width: 100%; max-width: 500px; padding: 10px; margin-bottom: 10px; border: 1px solid #999; box-sizing: border-box; }
        textarea { height: 120px; }
        button { padding: 10px 20px; cursor: pointer; background: white; color: black; border: 1px solid black; font-weight: bold; margin-right: 5px; }
        button:hover { background: #eee; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        .post-item { border-bottom: 1px dashed #ccc; padding: 15px 0; }
        .post-date { font-size: 0.8em; color: #666; margin-bottom: 5px; }
        .pagination { margin-top: 20px; display: flex; gap: 10px; justify-content: center; }
    </style>
</head>
<body>

    <div id="login-section" style="text-align: center; margin-top: 50px;">
        <h1>Class Portal</h1>
        <input type="email" id="login-email" placeholder="メールアドレス"><br>
        <input type="password" id="login-password" placeholder="パスワード"><br>
        <button type="button" onclick="login()">ログイン</button>
        <p id="error-message" style="color:red;"></p>
    </div>

    <div id="main-content" style="display: none;">
        <header style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid black; margin-bottom: 20px;">
            <h2 id="welcome-msg">読み込み中...</h2>
            <button onclick="logout()" style="border: 1px solid red; color: red;">ログアウト</button>
        </header>

        <main>
            <section id="schedule-section">
                <h2>📢 今週の予定</h2>
                <div id="schedule-display"><p id="schedule-text" style="white-space: pre-wrap; font-size: 1.1em;"></p></div>
                <div id="schedule-edit" style="display: none;">
                    <textarea id="schedule-input"></textarea><br>
                    <button onclick="updateSchedule()">予定を更新保存</button>
                </div>
                <p id="last-updated" style="font-size: 0.75em; color: #666; margin-top: 10px;"></p>
            </section>

            <section id="blog-section">
                <h2>📝 担任ブログ</h2>
                <div id="blog-admin-form" style="display: none; background: #f9f9f9; padding: 15px; border: 1px solid #000; margin-bottom: 20px;">
                    <h3>新規投稿</h3>
                    <textarea id="blog-input" placeholder="ブログ本文を入力..."></textarea><br>
                    <label style="font-size: 0.8em;">日時指定（空欄で現在時刻）:</label><br>
                    <input type="datetime-local" id="blog-datetime" style="max-width: 250px;"><br>
                    <button onclick="postBlog()">ブログを投稿する</button>
                </div>
                <div id="blog-list">投稿を取得しています...</div>
                <div class="pagination">
                    <button id="blog-prev" onclick="fetchBlogs('prev')" style="display:none;">前へ</button>
                    <button id="blog-next" onclick="fetchBlogs('next')" style="display:none;">次へ</button>
                </div>
            </section>

            <section id="admin-section" style="display: none; border: 2px solid red;">
                <h2 style="color: red;">🛠️ 管理者メニュー</h2>
                <div>
                    <h3>👥 名簿管理 (CSV)</h3>
                    <input type="file" id="csv-file" accept=".csv"><br>
                    <button onclick="importCSV()">インポート</button>
                    <button onclick="exportCSV()">書き出し</button>
                    <p id="import-status" style="font-weight:bold; color:blue;"></p>
                </div>
                <div style="margin-top: 20px;">
                    <h3>📊 ログ</h3>
                    <div id="log-list"></div>
                </div>
            </section>
        </main>
    </div>
