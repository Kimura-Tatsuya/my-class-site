<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>３年３組 学級管理システム</title>
    <style>
        /* ＭＳ ゴシックを基調としたスタイル */
        body { 
            background-color: white; 
            color: black; 
            font-family: "MS UI Gothic", "MS Gothic", "Osaka", sans-serif; 
            line-height: 1.5; 
            padding: 20px; 
            max-width: 850px; 
            margin: 0 auto; 
        }
        h1, h2, h3 { 
            font-weight: bold;
            border-bottom: 1px solid black; 
            margin-top: 25px;
            padding-bottom: 5px;
        }
        section { margin-bottom: 40px; border: 1px solid #000; padding: 20px; }
        input, textarea { 
            width: 100%; max-width: 500px; padding: 8px; margin-bottom: 10px; 
            border: 1px solid #000; box-sizing: border-box; font-family: inherit;
        }
        button { 
            padding: 8px 15px; cursor: pointer; background: white; color: black; 
            border: 1px solid black; font-weight: bold; font-family: inherit;
            margin-right: 5px; margin-bottom: 5px;
        }
        button:hover { background: #eeeeee; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        th, td { border: 1px solid black; padding: 8px; text-align: left; }
        th { background: #f2f2f2; }
        .post-item { border-bottom: 1px dashed #000; padding: 15px 0; }
        .post-date { font-size: 0.8em; color: #444; }
    </style>
</head>
<body>

    <div id="login-section" style="text-align: center; margin-top: 50px;">
        <h1>学級管理システム ログイン</h1>
        <input type="email" id="login-email" placeholder="メールアドレス"><br>
        <input type="password" id="login-password" placeholder="パスワード"><br>
        <button type="button" id="login-btn">ログイン</button>
        <p id="error-message" style="color:red; font-weight:bold;"></p>
    </div>

    <div id="main-content" style="display: none;">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 id="welcome-msg" style="border:none; margin:0;">確認中...</h2>
            <button id="logout-btn">ログアウト</button>
        </header>

        <main>
            <section>
                <h2>今週の予定</h2>
                <div id="schedule-display"><p id="schedule-text" style="white-space: pre-wrap;"></p></div>
                <div id="schedule-edit" style="display: none;">
                    <textarea id="schedule-input"></textarea><br>
                    <button id="update-schedule-btn">予定を保存更新</button>
                </div>
            </section>

            <section>
                <h2>担任ブログ</h2>
                <div id="blog-admin-form" style="display: none; background: #f9f9f9; padding: 15px; margin-bottom: 15px; border: 1px solid #000;">
                    <textarea id="blog-input" placeholder="投稿内容を入力してください"></textarea><br>
                    <button id="post-blog-btn">ブログを投稿する</button>
                </div>
                <div id="blog-list">取得中...</div>
            </section>

            <section id="admin-section" style="display: none; border: 3px double #000;">
                <h2 style="background: #000; color: #fff; padding: 5px;">管理者専用メニュー</h2>
                
                <h3>名簿管理</h3>
                <input type="file" id="csv-file" accept=".csv">
                <button id="import-csv-btn">名簿インポート(CSV)</button>
                <button id="export-student-btn">名簿エクスポート(CSV)</button>

                <h3>アクセスログ</h3>
                <button id="load-log-btn">ログを表示/更新</button>
                <div id="log-area" style="margin-top:10px;">
                    <table id="log-table">
                        <thead>
                            <tr><th>日時</th><th>メールアドレス</th></tr>
                        </thead>
                        <tbody id="log-table-body">
                            <tr><td colspan="2">「表示」ボタンを押してください</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC7R6Hbgt3C6iq_ozLM6FF6DBGA65j6dd0",
            authDomain: "my-class-site.firebaseapp.com",
            projectId: "my-class-site",
            storageBucket: "my-class-site.firebasestorage.app",
            messagingSenderId: "125594983188",
            appId: "1:125594983188:web:129aa54e9d3a39ca700001"
        };
        const TEACHER_EMAIL = "administrator@class.jp";

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ログイン処理
        document.getElementById('login-btn').onclick = () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            const errP = document.getElementById('error-message');
            errP.innerText = "";

            firebase.auth().signInWithEmailAndPassword(email, pass)
                .then(res => initApp(res.user))
                .catch(err => { errP.innerText = "ログインに失敗しました。"; });
        };

        async function initApp(user) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';

            // 氏名取得
            const userDoc = await db.collection("students").doc(user.email).get();
            const name = userDoc.exists ? userDoc.data().name : "ゲスト";
            document.getElementById('welcome-msg').innerText = name + " さん、おかえりなさい";

            // 予定読み込み
            db.collection("config").doc("weekly_schedule").onSnapshot(doc => {
                if(doc.exists) {
                    document.getElementById('schedule-text').innerText = doc.data().text;
                    document.getElementById('schedule-input').value = doc.data().text;
                }
            });

            // ブログ読み込み
            db.collection("blogs").orderBy("createdAt", "desc").limit(10).onSnapshot(snap => {
                const list = document.getElementById('blog-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    const date = data.createdAt ? data.createdAt.toDate().toLocaleString('ja-JP') : "日時不明";
                    list.innerHTML += `<div class="post-item"><div class="post-date">${date}</div><div>${data.content}</div></div>`;
                });
            });

            // 権限判定：管理者のみ表示
            if (user.email === TEACHER_EMAIL) {
                document.getElementById('admin-section').style.display = 'block';
                document.getElementById('schedule-edit').style.display = 'block';
                document.getElementById('blog-admin-form').style.display = 'block';
                document.getElementById('load-log-btn').onclick = loadLogs;
            }

            // アクセスログ記録（サーバーのルールで、生徒は「作成」のみ許可される）
            db.collection("access_logs").add({ 
                email: user.email, 
                loginTime: firebase.firestore.FieldValue.serverTimestamp() 
            });
        }

        // アクセスログ読み込み（管理者のみ成功する）
        async function loadLogs() {
            const tbody = document.getElementById('log-table-body');
            tbody.innerHTML = "<tr><td colspan='2'>読み込み中...</td></tr>";
            
            try {
                const snap = await db.collection("access_logs").orderBy("loginTime", "desc").limit(50).get();
                tbody.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const time = d.loginTime ? d.loginTime.toDate().toLocaleString() : "---";
                    tbody.innerHTML += `<tr><td>${time}</td><td>${d.email}</td></tr>`;
                });
            } catch (e) {
                tbody.innerHTML = "<tr><td colspan='2' style='color:red;'>閲覧権限がありません。</td></tr>";
            }
        }

        // 名簿エクスポート
        document.getElementById('export-student-btn').onclick = async () => {
            const snap = await db.collection("students").get();
            let csv = "メールアドレス,名前\n";
            snap.forEach(doc => { csv += `${doc.id},${doc.data().name}\n`; });
            const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: "text/csv" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "student_list.csv";
            a.click();
        };

        // 予定保存
        document.getElementById('update-schedule-btn').onclick = () => {
            db.collection("config").doc("weekly_schedule").set({
                text: document.getElementById('schedule-input').value,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => alert("保存しました"));
        };

        // ブログ投稿
        document.getElementById('post-blog-btn').onclick = () => {
            const content = document.getElementById('blog-input').value;
            if(!content) return;
            db.collection("blogs").add({
                content: content,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                document.getElementById('blog-input').value = "";
                alert("投稿しました");
            });
        };

        // 名簿インポート
        document.getElementById('import-csv-btn').onclick = () => {
            const file = document.getElementById('csv-file').files[0];
            if(!file) return alert("ファイルを選択してください");
            const reader = new FileReader();
            reader.onload = async (e) => {
                const rows = e.target.result.split("\n");
                for(let row of rows) {
                    const cols = row.split(",");
                    if(cols.length >= 2 && cols[0].includes("@")) {
                        await db.collection("students").doc(cols[0].trim()).set({ name: cols[1].trim() });
                    }
                }
                alert("インポート完了");
            };
            reader.readAsText(file);
        };

        document.getElementById('logout-btn').onclick = () => { location.reload(); };
    </script>
</body>
</html>
