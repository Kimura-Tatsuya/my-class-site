<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>5-Round System Master</title>
    <style>
        :root { --primary: #2563eb; --success: #22c55e; --error: #ef4444; --bg: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .admin-panel { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; border: 2px solid var(--primary); }
        .hidden { display: none; }
        
        /* ドラッグエリアのデザイン */
        #drop-zone { 
            border: 3px dashed #cbd5e1; border-radius: 10px; padding: 30px; 
            text-align: center; color: #64748b; background: #f1f5f9; cursor: pointer; margin-bottom: 15px;
        }
        #drop-zone.hover { background: #e2e8f0; border-color: var(--primary); }
        
        .game-area { text-align: center; max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; }
        .container { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin: 20px 0; min-height: 150px; }
        
        /* 画像・カードのスタイル */
        .item { 
            padding: 10px; background: #fff; border: 2px solid #333; border-radius: 8px;
            cursor: grab; font-size: 1.2rem; user-select: none; max-width: 200px;
        }
        .item img { max-width: 100%; border-radius: 4px; display: block; }
        .item.dragging { opacity: 0.4; }

        button { padding: 12px 20px; cursor: pointer; border: none; border-radius: 6px; background: var(--primary); color: white; font-weight: bold; margin: 5px; }
        .btn-toggle { position: fixed; bottom: 20px; right: 20px; opacity: 0.8; }
        #feedback { font-size: 1.5rem; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<button class="btn-toggle" onclick="authAdmin()">⚙ 教材設定・保存</button>

<div id="admin" class="admin-panel hidden">
    <h3>🖼 教材作成（画像ドラッグ＆ドロップ）</h3>
    <div id="drop-zone">ここに画像ファイルを複数ドロップしてください（Round 1用）</div>
    <p>または、文（単語）をカンマ区切りで入力（Round 2/4用）：</p>
    <textarea id="textInput" style="width:100%; height:60px;"></textarea>
    <div style="margin-top:10px;">
        <button onclick="saveAndBuild('round1')">Round 1 (画像並べ替え) 生成</button>
        <button onclick="saveAndBuild('round2')">Round 2 (文並べ替え) 生成</button>
        <button onclick="saveAndBuild('round4')">Round 4 (穴あき音読) 生成</button>
        <button onclick="clearData()" style="background:var(--error)">データ全消去</button>
    </div>
</div>

<div class="game-area">
    <h1 id="roundTitle">5-Round System</h1>
    <div id="displayArea">
        <div class="container" id="mainList"></div>
        <button id="checkBtn" onclick="checkOrder()" style="background:var(--success)">答え合わせ</button>
    </div>
    <div id="feedback"></div>
</div>

<script>
let db;
let currentAssets = [];
const SECRET_PASS = "password";

// --- Database 処理 (IndexedDB) ---
const request = indexedDB.open("EduToolDB", 1);
request.onupgradeneeded = e => {
    db = e.target.result;
    db.createObjectStore("materials", { keyPath: "id" });
};
request.onsuccess = e => {
    db = e.target.result;
    loadLastData(); // 前回保存したデータを読み込む
};

// --- 管理者認証 ---
function authAdmin() {
    if (prompt("パスワード：") === SECRET_PASS) document.getElementById('admin').classList.remove('hidden');
}

// --- 画像ドラッグ＆ドロップ処理 ---
const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('hover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('hover'));
dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('hover');
    const files = Array.from(e.dataTransfer.files);
    files.forEach(file => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            currentAssets.push({ type: 'image', content: ev.target.result });
            dropZone.innerText = currentAssets.length + " 個の画像が読み込まれました";
        };
        reader.readAsDataURL(file);
    });
});

// --- 保存と生成 ---
function saveAndBuild(mode) {
    const text = document.getElementById('textInput').value;
    const data = { id: "current", mode: mode, text: text, assets: currentAssets };
    
    const transaction = db.transaction(["materials"], "readwrite");
    transaction.objectStore("materials").put(data);
    
    buildUI(data);
    document.getElementById('admin').classList.add('hidden');
}

function loadLastData() {
    const transaction = db.transaction(["materials"], "readonly");
    const request = transaction.objectStore("materials").get("current");
    request.onsuccess = () => { if(request.result) buildUI(request.result); };
}

function buildUI(data) {
    const list = document.getElementById('mainList');
    const title = document.getElementById('roundTitle');
    const checkBtn = document.getElementById('checkBtn');
    list.innerHTML = '';
    document.getElementById('feedback').innerText = "";
    currentAssets = data.assets || [];

    if (data.mode === 'round1') {
        title.innerText = "Round 1: Picture Ordering";
        renderSortable(data.assets.map(a => `<img src="${a.content}">`), data.assets.map(a => a.content));
    } else if (data.mode === 'round2') {
        title.innerText = "Round 2: Sentence Ordering";
        const words = data.text.split(',').map(s => s.trim());
        renderSortable(words, words);
    } else if (data.mode === 'round4') {
        title.innerText = "Round 4: Hidden Reading";
        checkBtn.classList.add('hidden');
        data.text.split(',').map(s => s.trim()).forEach(word => {
            const span = document.createElement('span');
            span.className = 'item'; // ここでは穴あき用のスタイル
            span.style.background = "#333"; span.style.color = "#333";
            span.innerText = word;
            span.onclick = () => { span.style.background = span.style.background === "rgb(51, 51, 51)" ? "white" : "#333"; span.style.color = span.style.color === "rgb(51, 51, 51)" ? "black" : "#333"; };
            list.appendChild(span);
        });
    }
}

let correctArray = [];
function renderSortable(displayItems, logicItems) {
    correctArray = logicItems;
    const shuffled = displayItems.map((item, i) => ({item, originalIdx: i})).sort(() => Math.random() - 0.5);
    const list = document.getElementById('mainList');
    document.getElementById('checkBtn').classList.remove('hidden');

    shuffled.forEach(obj => {
        const div = document.createElement('div');
        div.className = 'item';
        div.draggable = true;
        div.innerHTML = obj.item;
        div.dataset.correctIdx = obj.originalIdx;
        div.addEventListener('dragstart', () => div.classList.add('dragging'));
        div.addEventListener('dragend', () => div.classList.remove('dragging'));
        list.appendChild(div);
    });
    setupDragAndDrop(list);
}

function setupDragAndDrop(list) {
    list.addEventListener('dragover', e => {
        e.preventDefault();
        const dragging = document.querySelector('.dragging');
        const siblings = [...list.querySelectorAll('.item:not(.dragging)')];
        const next = siblings.find(sib => e.clientX <= sib.getBoundingClientRect().left + sib.offsetWidth / 2);
        list.insertBefore(dragging, next);
    });
}

function checkOrder() {
    const items = [...document.querySelectorAll('.item')];
    let isCorrect = items.every((item, idx) => parseInt(item.dataset.correctIdx) === idx);
    const fb = document.getElementById('feedback');
    fb.innerText = isCorrect ? "✨ Correct! ✨" : "Try again!";
    fb.style.color = isCorrect ? "var(--success)" : "var(--error)";
}

function clearData() { if(confirm("データを全消去しますか？")) { db.transaction(["materials"], "readwrite").objectStore("materials").clear(); location.reload(); } }
</script>
</body>
</html>
